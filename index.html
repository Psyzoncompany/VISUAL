function rand(a,b){return Math.random()*(b-a)+a}
function randInt(a,b){return Math.floor(rand(a,b+1))}
function dist(x1,y1,x2,y2){return Math.sqrt((x2-x1)**2+(y2-y1)**2)}
function clamp(v,mn,mx){return Math.max(mn,Math.min(mx,v))}
function lerp(a,b,t){return a+(b-a)*t}
function w2t(wx,wy){return{x:Math.floor(wx/TILE),y:Math.floor(wy/TILE)}}
function getViewSize(){return{w:W/gs.zoom,h:H/gs.zoom}}
function clampCamera(){
    let vw=W/gs.zoom,vh=H/gs.zoom;
    gs.camera.x=clamp(gs.camera.x,0,Math.max(0,MAP_W*TILE-vw));
    gs.camera.y=clamp(gs.camera.y,0,Math.max(0,MAP_H*TILE-vh));
}
function updateMouseWorld(){
    mouse.wx=mouse.x/gs.zoom+gs.camera.x;
    mouse.wy=mouse.y/gs.zoom+gs.camera.y;
}
function hash(x,y){let h=x*374761393+y*668265263;h=(h^(h>>13))*1274126177;return(h^(h>>16))&0x7FFFFFFF}
function srand(x,y){return(hash(x,y)%10000)/10000}
function terrIndex(tx,ty){return ty*TERR_W+tx}
function tileToTerr(tx,ty){return{x:clamp(Math.floor(tx/TERR_TILE),0,TERR_W-1),y:clamp(Math.floor(ty/TERR_TILE),0,TERR_H-1)}}
function worldToTerr(wx,wy){let t=w2t(wx,wy);return tileToTerr(t.x,t.y)}
function getTerritoryByTile(tx,ty){let tt=tileToTerr(tx,ty);return gs.territories[terrIndex(tt.x,tt.y)]}
function getTerritoryByWorld(wx,wy){let tt=worldToTerr(wx,wy);return gs.territories[terrIndex(tt.x,tt.y)]}
function getTerritoryCenterWorld(ttx,tty){
    return {x:(ttx*TERR_TILE+TERR_TILE/2)*TILE,y:(tty*TERR_TILE+TERR_TILE/2)*TILE};
}
function armyCount(comp){return (comp.SWORDSMAN||0)+(comp.ARCHER||0)+(comp.SPEARMAN||0)}
function armyPower(comp,posBonus){
    let total=(comp.SWORDSMAN||0)*1.1+(comp.ARCHER||0)*1.15+(comp.SPEARMAN||0)*1.05;
    return total*(1+posBonus);
}
function mergeArmyComposition(dst,src){
    dst.SWORDSMAN=(dst.SWORDSMAN||0)+(src.SWORDSMAN||0);
    dst.ARCHER=(dst.ARCHER||0)+(src.ARCHER||0);
    dst.SPEARMAN=(dst.SPEARMAN||0)+(src.SPEARMAN||0);
}

function loadImg(src){
    let img=new Image();img.src=src;return img;
}
function drawCharSheet(sheets,animState,dir,animFrame,dx,dy,size,rowMap){
    if(!sheets)return false;
    let img=sheets[animState]||sheets.idle;
    if(!img||!img.complete||!img.naturalWidth)return false;
    let mf=Math.max(1,Math.floor(img.naturalWidth/CHAR_FW));
    let f=animFrame%mf;
    let rows=rowMap||DIR_TO_ROW;
    let row=rows[dir]||0;
    ctx.drawImage(img,f*CHAR_FW,row*CHAR_FH,CHAR_FW,CHAR_FH,dx,dy,size,size);
    return true;
}
function getGuideMatches(query){
    let q=query.trim().toLowerCase();
    if(!q)return GUIDE_ENTRIES;
    return GUIDE_ENTRIES.filter(entry=>{
        let blob=(entry.title+' '+entry.keywords+' '+entry.body).toLowerCase();
        return blob.includes(q);
    });
}

// Desenha um ícone na posição (x,y) com tamanho s
function drawIC(name,x,y,s){
    let ic=IC[name];
    if(!ic) return;
    try{ctx.drawImage(ic,x,y,s||ic._s,s||ic._s);}catch(e){}
}

// Desenha ícone + texto ao lado, retorna largura total
function drawIconText(iconName,text,x,y,s,gap){
    let sz=s||16,g=gap||4;
    drawIC(iconName,x,y-sz+3,sz);
    ctx.fillText(text,x+sz+g,y);
    return sz+g+ctx.measureText(text).width;
}

// GERAÇÃO DO MAPA
// ═══════════════════════════════════════════════════════════
function generateMap(){
    let noise=[], moist=[];
    for(let y=0;y<MAP_H;y++){
        noise[y]=[];moist[y]=[];
        for(let x=0;x<MAP_W;x++){
            noise[y][x]=srand(x*7+13,y*11+7);
            moist[y][x]=srand(x*3+97,y*5+53);
        }
    }
    for(let iter=0;iter<5;iter++){
        let nn=[],nm=[];
        for(let y=0;y<MAP_H;y++){
            nn[y]=[];nm[y]=[];
            for(let x=0;x<MAP_W;x++){
                let s=0,ms=0,c=0;
                for(let dy=-2;dy<=2;dy++){for(let dx=-2;dx<=2;dx++){
                    let ny=clamp(y+dy,0,MAP_H-1),nx=clamp(x+dx,0,MAP_W-1);
                    s+=noise[ny][nx];ms+=moist[ny][nx];c++;
                }}
                nn[y][x]=s/c;nm[y][x]=ms/c;
            }
        }
        noise=nn;moist=nm;
    }

    let map=[];
    for(let y=0;y<MAP_H;y++){
        map[y]=[];
        for(let x=0;x<MAP_W;x++){
            let h=noise[y][x],m=moist[y][x];
            if(h<0.35) map[y][x]=T.WATER;
            else if(h<0.40) map[y][x]=T.SAND;
            else if(h<0.70){
                if(m>0.55) map[y][x]=T.FOREST;
                else if(m>0.48) map[y][x]=T.FIELD;
                else map[y][x]=T.GRASS;
            }
            else if(h<0.82) map[y][x]=T.GRASS;
            else map[y][x]=T.MOUNTAIN;
        }
    }

    // Limpar área inicial (centro)
    let cx=Math.floor(MAP_W/2),cy=Math.floor(MAP_H/2);
    for(let dy=-8;dy<=8;dy++)for(let dx=-8;dx<=8;dx++){
        let ny=cy+dy,nx=cx+dx;
        if(ny>=0&&ny<MAP_H&&nx>=0&&nx<MAP_W) map[ny][nx]=T.GRASS;
    }

    // Estradas a partir do centro
    [[1,0],[-1,0],[0,1],[0,-1]].forEach(([ddx,ddy])=>{
        let rx=cx,ry=cy;
        for(let i=0;i<40;i++){
            rx+=ddx;ry+=ddy;
            if(Math.random()>0.65){rx+=(ddy!==0?randInt(-1,1):0);ry+=(ddx!==0?randInt(-1,1):0)}
            rx=clamp(rx,1,MAP_W-2);ry=clamp(ry,1,MAP_H-2);
            if(map[ry][rx]!==T.WATER&&map[ry][rx]!==T.MOUNTAIN){
                map[ry][rx]=T.ROAD;
                if(ry+1<MAP_H&&map[ry+1][rx]!==T.WATER) map[ry+1][rx]=T.ROAD;
            }
        }
    });

    // Rios
    for(let r=0;r<2;r++){
        let rx=randInt(10,MAP_W-10),ry=0;
        while(ry<MAP_H){
            for(let dx=-1;dx<=1;dx++){
                let nx=rx+dx;
                if(nx>=0&&nx<MAP_W) map[ry][nx]=T.WATER;
            }
            ry++;rx+=randInt(-1,1);rx=clamp(rx,2,MAP_W-3);
        }
    }

    // Re-limpar centro após rios
    for(let dy=-6;dy<=6;dy++)for(let dx=-6;dx<=6;dx++){
        let ny=cy+dy,nx=cx+dx;
        if(ny>=0&&ny<MAP_H&&nx>=0&&nx<MAP_W) map[ny][nx]=T.GRASS;
    }

    // Limpar cantos dos reinos IA
    // Bárbaros (NW)
    for(let dy=-5;dy<=5;dy++)for(let dx=-5;dx<=5;dx++){
        let ny=8+dy,nx=8+dx;
        if(ny>=0&&ny<MAP_H&&nx>=0&&nx<MAP_W&&map[ny][nx]!==T.WATER) map[ny][nx]=T.GRASS;
    }
    // Magos (SE)
    for(let dy=-5;dy<=5;dy++)for(let dx=-5;dx<=5;dx++){
        let ny=MAP_H-9+dy,nx=MAP_W-9+dx;
        if(ny>=0&&ny<MAP_H&&nx>=0&&nx<MAP_W&&map[ny][nx]!==T.WATER) map[ny][nx]=T.GRASS;
    }
    // Vampiros (NE) - terreno sombrio com mais florestas
    for(let dy=-5;dy<=5;dy++)for(let dx=-5;dx<=5;dx++){
        let ny=8+dy,nx=MAP_W-9+dx;
        if(ny>=0&&ny<MAP_H&&nx>=0&&nx<MAP_W){
            map[ny][nx]=(Math.abs(dx)+Math.abs(dy)<4)?T.GRASS:T.FOREST;
        }
    }

    return map;
}

class Entity{
    constructor(x,y){
        this.x=x;this.y=y;this.hp=100;this.maxHp=100;
        this.frame=0;this.ftimer=0;this.dir=0;this.alive=true;
        this.flashTimer=0;
        this.animState='idle';this.animFrame=0;this.animTimer=0;
    }
    update(dt){
        this.ftimer+=dt;
        if(this.ftimer>0.18){this.ftimer=0;this.frame=(this.frame+1)%4}
        this.animTimer+=dt;
        let aspd=this.animState==='attack'?0.09:0.13;
        if(this.animTimer>=aspd){
            this.animTimer=0;this.animFrame++;
            let mf=ANIM_FRAMES[this.animState]||6;
            if(this.animFrame>=mf)this.animFrame=0;
        }
        if(this.flashTimer>0) this.flashTimer-=dt;
        if(this.hp<=0) this.alive=false;
    }
    takeDamage(dmg){
        this.hp-=dmg;
        this.flashTimer=0.1;
        if(this.hp<=0){this.hp=0;this.alive=false}
        addParticle(this.x,this.y-12,'-'+dmg,'#FF4444');
    }
}

class King extends Entity{
    constructor(x,y){
        super(x,y);this.speed=2.8;this.hp=200;this.maxHp=200;
        this.atk=20;this.def=15;this.attackTimer=0;
    }
    update(dt){
        super.update(dt);
        this.attackTimer-=dt;
        let dx=0,dy=0;
        if(keys['KeyW']||keys['ArrowUp'])dy=-1;
        if(keys['KeyS']||keys['ArrowDown'])dy=1;
        if(keys['KeyA']||keys['ArrowLeft'])dx=-1;
        if(keys['KeyD']||keys['ArrowRight'])dx=1;

        if(dx||dy){
            let len=Math.sqrt(dx*dx+dy*dy);dx/=len;dy/=len;
            let nx=this.x+dx*this.speed*TILE*dt;
            let ny=this.y+dy*this.speed*TILE*dt;
            let t=w2t(nx,ny);
            if(t.x>=0&&t.x<MAP_W&&t.y>=0&&t.y<MAP_H){
                let ter=gs.map[t.y][t.x];
                if(ter!==T.MOUNTAIN){
                    // Checar colisão com construção
                    let blocked=false;
                    for(let b of gs.buildings){
                        if(b.hp<=0)continue;
                        let bx=b.x*TILE,by=b.y*TILE,bw=b.def.w*TILE,bh=b.def.h*TILE;
                        if(nx>bx+4&&nx<bx+bw-4&&ny>by+4&&ny<by+bh-4){blocked=true;break}
                    }
                    if(!blocked){
                        this.x=clamp(nx,TILE,(MAP_W-1)*TILE);
                        this.y=clamp(ny,TILE,(MAP_H-1)*TILE);
                    }
                }
            }
            if(Math.abs(dx)>Math.abs(dy))this.dir=dx>0?3:2;
            else this.dir=dy>0?0:1;
        }

        // Auto-ataque inimigos próximos
        let isMoving=!!(dx||dy);
        if(this.attackTimer<=0){
            for(let e of gs.enemies){
                if(!e.alive)continue;
                if(dist(this.x,this.y,e.x,e.y)<TILE*1.5){
                    let dmg=Math.max(1,Math.floor((this.atk-Math.floor(e.def*0.3))*getCombatMultiplier()));
                    e.takeDamage(dmg);
                    this.attackTimer=0.6;
                    addExplosion(e.x,e.y);
                    break;
                }
            }
        }
        if(this.attackTimer>0.3)this.animState='attack';
        else if(isMoving)this.animState='walk';
        else this.animState='idle';
    }
    draw(){
        let sx=this.x-gs.camera.x,sy=this.y-gs.camera.y;
        let sz=TILE+6;
        if(this.flashTimer>0){ctx.globalAlpha=0.5+(Math.sin(gs.gameTime*40)*0.5)}
        if(!drawCharSheet(SC.char_lvl3,this.animState,this.dir,this.animFrame,sx-sz/2,sy-sz/2,sz)){
            ctx.drawImage(SC.king[this.frame],sx-TILE/2,sy-TILE/2);
        }
        ctx.globalAlpha=1;
        drawHP(sx-TILE/2,sy-TILE/2-10,TILE,5,this.hp,this.maxHp);
        ctx.fillStyle='#FFD700';ctx.font='14px monospace';ctx.textAlign='center';
        ctx.fillText('♛',sx,sy-TILE/2-14);ctx.textAlign='left';
    }
}

class PlayerUnit extends Entity{
    constructor(x,y,type){
        super(x,y);
        let d=UDEF[type];
        this.type=type;this.name=d.name;
        this.hp=d.hp;this.maxHp=d.hp;
        this.atk=d.atk+(gs.upgrades.forge*3);this.def=d.def;this.speed=d.spd;
        this.range=d.range;this.selected=false;
        this.targetEnemy=null;this.moveTarget=null;
        this.attackTimer=0;this.state='idle';
    }
    update(dt){
        super.update(dt);
        this.attackTimer-=dt;

        // Procurar inimigo se não tem alvo
        if(!this.targetEnemy||!this.targetEnemy.alive){
            this.targetEnemy=null;
            let md=this.range*TILE*4;
            for(let e of gs.enemies){
                if(!e.alive)continue;
                let d=dist(this.x,this.y,e.x,e.y);
                if(d<md){md=d;this.targetEnemy=e}
            }
        }

        if(this.moveTarget){
            let dx=this.moveTarget.x-this.x,dy=this.moveTarget.y-this.y;
            let d=Math.sqrt(dx*dx+dy*dy);
            if(d>8){
                this.state='moving';
                let nx=this.x+(dx/d)*this.speed*TILE*dt;
                let ny=this.y+(dy/d)*this.speed*TILE*dt;
                let t=w2t(nx,ny);
                if(t.x>=0&&t.x<MAP_W&&t.y>=0&&t.y<MAP_H){
                    let ter=gs.map[t.y][t.x];
                    if(ter!==T.MOUNTAIN){this.x=nx;this.y=ny}
                }
                if(Math.abs(dx)>Math.abs(dy))this.dir=dx>0?3:2;
                else this.dir=dy>0?0:1;
            } else {this.moveTarget=null;this.state='idle'}
        }
        else if(this.targetEnemy&&this.targetEnemy.alive){
            let d=dist(this.x,this.y,this.targetEnemy.x,this.targetEnemy.y);
            if(d<=this.range*TILE){
                this.state='attacking';
                if(this.attackTimer<=0){
                    let dmg=Math.max(1,Math.floor((this.atk-Math.floor(this.targetEnemy.def*0.3))*getCombatMultiplier()));
                    this.targetEnemy.takeDamage(dmg);
                    this.attackTimer=0.8;
                    if(this.type==='ARCHER'){
                        gs.projectiles.push({x:this.x,y:this.y-8,tx:this.targetEnemy.x,ty:this.targetEnemy.y-8,timer:0.3,color:'#FFD700'});
                    } else {addExplosion(this.targetEnemy.x,this.targetEnemy.y)}
                }
            } else {
                let dx=this.targetEnemy.x-this.x,dy=this.targetEnemy.y-this.y;
                let len=Math.sqrt(dx*dx+dy*dy);
                let nx=this.x+(dx/len)*this.speed*TILE*dt;
                let ny=this.y+(dy/len)*this.speed*TILE*dt;
                let t=w2t(nx,ny);
                if(t.x>=0&&t.x<MAP_W&&t.y>=0&&t.y<MAP_H){
                    let ter=gs.map[t.y][t.x];
                    if(ter!==T.MOUNTAIN){this.x=nx;this.y=ny}
                }
                this.state='moving';
            }
        } else this.state='idle';

        if(this.state==='attacking')this.animState='attack';
        else if(this.state==='moving')this.animState='walk';
        else this.animState='idle';
    }
    draw(){
        let sx=this.x-gs.camera.x,sy=this.y-gs.camera.y;
        let sz=TILE+4;
        let sheet=SC[UNIT_SHEET_MAP[this.type]];
        if(this.flashTimer>0){ctx.globalAlpha=0.5+(Math.sin(gs.gameTime*40)*0.5)}
        if(!drawCharSheet(sheet,this.animState,this.dir,this.animFrame,sx-sz/2,sy-sz/2,sz)){
            let spr=SC[this.type.toLowerCase()];
            if(spr)ctx.drawImage(spr[this.frame],sx-TILE/2,sy-TILE/2);
        }
        ctx.globalAlpha=1;
        if(this.selected){
            ctx.strokeStyle='#0F0';ctx.lineWidth=2;
            ctx.strokeRect(sx-sz/2-2,sy-sz/2-2,sz+4,sz+4);
        }
        drawHP(sx-TILE/2,sy-TILE/2-8,TILE,4,this.hp,this.maxHp);
    }
}

class EnemyUnit extends Entity{
    constructor(x,y,type){
        super(x,y);
        this.type=type;
        this.isVampire=!!VAMP_STATS[type];
        if(this.isVampire){
            let vs=VAMP_STATS[type];
            this.speed=vs.spd;this.atk=vs.atk;this.def=vs.def;
            this.hp=vs.hp;this.maxHp=vs.hp;this.range=vs.range;
            this.lifeSteal=vs.lifeSteal||0;
            this.auraRange=vs.auraRange||0;this.auraBonus=vs.auraBonus||0;
            this.flying=vs.flying||false;
            this.loot=vs.loot;
        }else{
            this.speed=type==='bandit'?1.2:type==='creature'?0.9:1.0;
            this.atk=type==='creature'?18:type==='soldier'?12:8;
            this.def=type==='soldier'?8:type==='creature'?6:3;
            this.hp=type==='creature'?120:type==='soldier'?70:40;
            this.maxHp=this.hp;this.range=1.3;
            this.loot={gold:type==='bandit'?20:type==='creature'?30:10,food:type==='creature'?10:5};
        }
        this.target=null;this.attackTimer=0;
    }
    findTarget(){
        this.target=null;
        let md=Infinity;
        // Alvejar unidades do jogador
        for(let u of gs.units){
            if(!u.alive)continue;
            let d=dist(this.x,this.y,u.x,u.y);
            if(d<md){md=d;this.target=u}
        }
        // Alvejar rei
        if(gs.king&&gs.king.alive){
            let d=dist(this.x,this.y,gs.king.x,gs.king.y);
            if(d<md){md=d;this.target=gs.king}
        }
        // Se nenhuma unidade perto, ir pro castelo
        if(!this.target||md>TILE*15){
            let castle=gs.buildings.find(b=>b.type==='CASTLE'&&b.hp>0);
            if(castle){
                let bx=castle.x*TILE+castle.def.w*TILE/2;
                let by=castle.y*TILE+castle.def.h*TILE/2;
                this.target={x:bx,y:by,alive:true,isBuilding:true,building:castle,def:5,
                    takeDamage:(d)=>{castle.hp-=d;if(castle.hp<=0)addMessage('[!!] Castelo destruído!')}};
            }
        }
    }
    update(dt){
        super.update(dt);
        this.attackTimer-=dt;

        // Vampire day/night modifier
        let spdMod=1,atkMod=1;
        if(this.isVampire){
            if(gs.isNight){spdMod=1.3;atkMod=1.25}
            else{spdMod=0.7;atkMod=0.8}
        }

        // Vampire Lord aura - boost nearby vampires
        if(this.type==='vamp_lord'){
            for(let e of gs.enemies){
                if(!e.alive||e===this||!e.isVampire)continue;
                if(dist(this.x,this.y,e.x,e.y)<this.auraRange*TILE){
                    e._auraBoost=this.auraBonus;
                }
            }
        }
        let auraMod=1+(this._auraBoost||0);
        this._auraBoost=0;

        if(!this.target||!this.target.alive||(this.target.isBuilding&&this.target.building.hp<=0)){
            this.findTarget();
        }

        if(this.target){
            let tx=this.target.x,ty=this.target.y;
            let d=dist(this.x,this.y,tx,ty);
            if(d<=this.range*TILE){
                this.animState='attack';
                if(this.attackTimer<=0){
                    let targetDef=this.target.def||0;
                    let dmg=Math.max(1,Math.floor(this.atk*atkMod*auraMod-Math.floor(targetDef*0.3)));
                    this.target.takeDamage(dmg);
                    this.attackTimer=1.2;
                    // Life steal for vampire warrior
                    if(this.lifeSteal>0){
                        let heal=Math.floor(dmg*this.lifeSteal);
                        this.hp=Math.min(this.maxHp,this.hp+heal);
                        addParticle(this.x,this.y-8,'+'+heal,'#00CC00');
                    }
                }
            } else {
                let ddx=tx-this.x,ddy=ty-this.y,len=Math.sqrt(ddx*ddx+ddy*ddy);
                let spd=this.speed*spdMod;
                let nx=this.x+(ddx/len)*spd*TILE*dt;
                let ny=this.y+(ddy/len)*spd*TILE*dt;
                let t=w2t(nx,ny);
                if(t.x>=0&&t.x<MAP_W&&t.y>=0&&t.y<MAP_H){
                    let ter=gs.map[t.y][t.x];
                    if(this.flying||ter!==T.MOUNTAIN){this.x=nx;this.y=ny}
                }
                if(Math.abs(ddx)>Math.abs(ddy))this.dir=ddx>0?3:2;
                else this.dir=ddy>0?0:1;
                this.animState='walk';
            }
        } else this.animState='idle';
    }
    draw(){
        let sx=this.x-gs.camera.x,sy=this.y-gs.camera.y;
        let sz=TILE+4;
        if(this.flashTimer>0){ctx.globalAlpha=0.5+(Math.sin(gs.gameTime*40)*0.5)}
        let drawn=false;
        if(this.isVampire){
            let spr=SC[this.type];
            if(spr&&spr[this.frame]) ctx.drawImage(spr[this.frame],sx-TILE/2,sy-TILE/2);
            drawn=true;
        }else{
            let sheetKey=ENEMY_SHEET_MAP[this.type];
            if(sheetKey)drawn=drawCharSheet(SC[sheetKey],this.animState,this.dir,this.animFrame,sx-sz/2,sy-sz/2,sz,ORC_DIR_TO_ROW);
            if(!drawn){
                let key=ENEMY_SPRITE_MAP[this.type];
                let spr=SC[key];if(spr)ctx.drawImage(spr[this.frame],sx-TILE/2,sy-TILE/2);
            }
        }
        ctx.globalAlpha=1;
        drawHP(sx-TILE/2,sy-TILE/2-8,TILE,4,this.hp,this.maxHp);
        // Icon label acima do inimigo
        let iconName=this.type==='vamp_warrior'?'vampire':this.type==='vamp_lord'?'crown':this.type==='giant_bat'?'bat':this.type==='soldier'?'swords':'creature';
        drawIC(iconName,sx-6,sy-TILE/2-20,12);
    }
}

// ═══════════════════════════════════════════════════════════
// CLASSE ANIMAL
// ═══════════════════════════════════════════════════════════
class Animal{
    constructor(x,y,type){
        this.x=x;this.y=y;this.type=type;
        let def=ANIM_DEF[type];
        this.name=def.name;
        this.hp=def.hp;this.maxHp=def.hp;
        this.food=def.food;
        this.speed=def.spd;
        this.aggressive=def.aggressive||false;
        this.atk=def.atk||0;
        this.alive=true;
        this.state='idle';
        this.dir=0;
        this.animState='idle';this.animFrame=0;this.animTimer=0;
        this.ftimer=0;this.frame=0;
        this.flashTimer=0;
        this.attackTimer=0;
        this.wanderTimer=rand(1,4);
        this.wanderTarget=null;
        this.targetHunter=null;
        this.deathTimer=0; // show death anim briefly
    }
    takeDamage(dmg){
        this.hp-=dmg;
        this.flashTimer=0.1;
        if(this.hp<=0){this.hp=0;this.alive=false;this.deathTimer=0.8}
        addParticle(this.x,this.y-12,'-'+dmg,'#FF4444');
    }
    update(dt){
        // Update animation
        this.ftimer+=dt;
        if(this.ftimer>0.18){this.ftimer=0;this.frame=(this.frame+1)%4}
        this.animTimer+=dt;
        let aspd=this.animState==='attack'?0.09:0.13;
        if(this.animTimer>=aspd){this.animTimer=0;this.animFrame++;let mf=ANIM_FRAMES[this.animState]||6;if(this.animFrame>=mf)this.animFrame=0}
        if(this.flashTimer>0) this.flashTimer-=dt;

        if(!this.alive) return;

        // Aggressive animals attack nearby hunters
        if(this.aggressive){
            let near=null,md=TILE*5;
            for(let u of gs.units){
                if(!u.alive||u.type!=='HUNTER')continue;
                let d=dist(this.x,this.y,u.x,u.y);
                if(d<md){md=d;near=u}
            }
            this.targetHunter=near;
        }

        if(this.targetHunter&&this.targetHunter.alive){
            let d=dist(this.x,this.y,this.targetHunter.x,this.targetHunter.y);
            if(d<=TILE*1.2){
                this.animState='attack';
                this.attackTimer-=dt;
                if(this.attackTimer<=0){
                    this.targetHunter.takeDamage(this.atk);
                    this.attackTimer=1.5;
                }
            } else {
                let dx=this.targetHunter.x-this.x,dy=this.targetHunter.y-this.y,len=Math.sqrt(dx*dx+dy*dy);
                this.x+=(dx/len)*this.speed*TILE*dt;
                this.y+=(dy/len)*this.speed*TILE*dt;
                if(Math.abs(dx)>Math.abs(dy))this.dir=dx>0?3:2;else this.dir=dy>0?0:1;
                this.animState='walk';
            }
        } else {
            // Wander
            this.wanderTimer-=dt;
            if(this.wanderTimer<=0){
                this.wanderTimer=rand(3,8);
                let tx=this.x+rand(-TILE*4,TILE*4);
                let ty=this.y+rand(-TILE*4,TILE*4);
                tx=clamp(tx,TILE,( MAP_W-1)*TILE);
                ty=clamp(ty,TILE,(MAP_H-1)*TILE);
                let t=w2t(tx,ty);
                if(t.x>=0&&t.x<MAP_W&&t.y>=0&&t.y<MAP_H){
                    let ter=gs.map[t.y][t.x];
                    if(ter!==T.WATER&&ter!==T.MOUNTAIN) this.wanderTarget={x:tx,y:ty};
                }
            }
            if(this.wanderTarget){
                let dx=this.wanderTarget.x-this.x,dy=this.wanderTarget.y-this.y,d=Math.sqrt(dx*dx+dy*dy);
                if(d>8){
                    let nx=this.x+(dx/d)*this.speed*TILE*dt;
                    let ny=this.y+(dy/d)*this.speed*TILE*dt;
                    let t=w2t(nx,ny);
                    if(t.x>=0&&t.x<MAP_W&&t.y>=0&&t.y<MAP_H){
                        let ter=gs.map[t.y][t.x];
                        if(ter!==T.MOUNTAIN&&ter!==T.WATER){this.x=nx;this.y=ny}
                    }
                    if(Math.abs(dx)>Math.abs(dy))this.dir=dx>0?3:2;else this.dir=dy>0?0:1;
                    this.animState='walk';
                } else {this.wanderTarget=null;this.animState='idle'}
            } else {this.animState='idle'}
        }
    }
    draw(){
        let sx=this.x-gs.camera.x,sy=this.y-gs.camera.y;
        let sz=TILE+4;
        let sheetKey='animal_'+this.type;
        let sheet=SC[sheetKey];
        let animKey=this.alive?this.animState:(this.deathTimer>0?'death':'idle');
        if(this.flashTimer>0)ctx.globalAlpha=0.5+(Math.sin(gs.gameTime*40)*0.5);
        // Draw using spritesheet or fallback colored rect
        if(!drawCharSheet(sheet,animKey,this.dir,this.animFrame,sx-sz/2,sy-sz/2,sz)){
            let def=ANIM_DEF[this.type];
            ctx.fillStyle=this.alive?def.color:'#555';
            if(this.flashTimer>0)ctx.fillStyle='#FFF';
            ctx.fillRect(sx-10,sy-10,20,20);
            ctx.fillStyle='#FFF';ctx.font='9px monospace';ctx.textAlign='center';
            ctx.fillText(def.icon||def.name[0],sx,sy+4);
            ctx.textAlign='left';
        }
        ctx.globalAlpha=1;
        if(this.alive) drawHP(sx-TILE/2,sy-TILE/2-8,TILE,3,this.hp,this.maxHp);
    }
}

// ═══════════════════════════════════════════════════════════
// CLASSE CAÇADOR (HUNTER)
// ═══════════════════════════════════════════════════════════
class Hunter extends Entity{
    constructor(x,y){
        super(x,y);
        let d=UDEF.HUNTER;
        this.type='HUNTER';this.name=d.name;
        this.hp=d.hp;this.maxHp=d.hp;
        this.atk=d.atk;this.def=d.def;this.speed=d.spd;
        this.range=d.range;
        this.selected=false;
        this.state='searching'; // searching, pursuing, attacking, collecting, returning, delivering
        this.targetAnimal=null;
        this.targetCorpse=null;
        this.moveTarget=null;
        this.attackTimer=0;
        this.collectTimer=0;
        this.carrying=0; // food being carried
    }
    update(dt){
        super.update(dt);
        this.attackTimer-=dt;

        // State machine
        switch(this.state){
        case 'searching':{
            // Find nearest living animal
            let best=null,bd=Infinity;
            for(let a of gs.animals){
                if(!a.alive)continue;
                let d=dist(this.x,this.y,a.x,a.y);
                if(d<bd){bd=d;best=a}
            }
            if(best){this.targetAnimal=best;this.state='pursuing';this.moveTarget=null}
            else{
                // Wander if no animals found
                if(!this.moveTarget){
                    let tx=this.x+rand(-TILE*6,TILE*6);
                    let ty=this.y+rand(-TILE*6,TILE*6);
                    tx=clamp(tx,TILE,(MAP_W-1)*TILE);ty=clamp(ty,TILE,(MAP_H-1)*TILE);
                    let t=w2t(tx,ty);
                    if(t.x>=0&&t.x<MAP_W&&t.y>=0&&t.y<MAP_H&&gs.map[t.y][t.x]!==T.WATER&&gs.map[t.y][t.x]!==T.MOUNTAIN)
                        this.moveTarget={x:tx,y:ty};
                }
            }
            break;
        }
        case 'pursuing':{
            if(!this.targetAnimal||!this.targetAnimal.alive){
                // Check for a collectible corpse
                let corp=null,cd=Infinity;
                for(let a of gs.animals){
                    if(a.alive)continue;
                    if(a.food<=0)continue;
                    let d=dist(this.x,this.y,a.x,a.y);
                    if(d<cd){cd=d;corp=a}
                }
                if(corp){this.targetCorpse=corp;this.state='collecting';this.moveTarget=null;break}
                this.targetAnimal=null;this.state='searching';this.moveTarget=null;break;
            }
            let d=dist(this.x,this.y,this.targetAnimal.x,this.targetAnimal.y);
            if(d<=this.range*TILE){this.state='attacking';this.moveTarget=null}
            else{this.moveTarget={x:this.targetAnimal.x,y:this.targetAnimal.y}}
            break;
        }
        case 'attacking':{
            if(!this.targetAnimal||!this.targetAnimal.alive){
                // Animal died - go collect
                let corp=null,cd=Infinity;
                for(let a of gs.animals){
                    if(a.alive)continue;if(a.food<=0)continue;
                    let d=dist(this.x,this.y,a.x,a.y);
                    if(d<cd){cd=d;corp=a}
                }
                if(corp){this.targetCorpse=corp;this.state='collecting';this.moveTarget=null;break}
                this.targetAnimal=null;this.state='searching';break;
            }
            let d=dist(this.x,this.y,this.targetAnimal.x,this.targetAnimal.y);
            if(d>this.range*TILE){this.state='pursuing';break}
            // Fire arrow
            if(this.attackTimer<=0){
                let dmg=Math.max(1,Math.floor(this.atk*getCombatMultiplier()));
                this.targetAnimal.takeDamage(dmg);
                this.attackTimer=1.0;
                gs.projectiles.push({x:this.x,y:this.y-8,tx:this.targetAnimal.x,ty:this.targetAnimal.y-8,timer:0.35,color:'#8BC34A'});
                this.animState='attack';
            }
            break;
        }
        case 'collecting':{
            if(!this.targetCorpse||this.targetCorpse.food<=0){this.state='searching';this.targetCorpse=null;break}
            let d=dist(this.x,this.y,this.targetCorpse.x,this.targetCorpse.y);
            if(d<=TILE*1.5){
                this.collectTimer-=dt;
                if(this.collectTimer<=0){
                    this.carrying+=this.targetCorpse.food;
                    addParticle(this.x,this.y-16,'+'+this.targetCorpse.food+' 🍖','#FF9944');
                    this.targetCorpse.food=0;
                    this.targetCorpse=null;
                    this.state='returning';
                    this.moveTarget=null;
                }
            } else {
                this.moveTarget={x:this.targetCorpse.x,y:this.targetCorpse.y};
                this.collectTimer=0.8;
            }
            break;
        }
        case 'returning':{
            // Find nearest castle or city building
            let dest=null,dd=Infinity;
            for(let b of gs.buildings){
                if(b.hp<=0)continue;
                if(b.type==='CASTLE'||b.type==='FARM'||b.type==='HOUSE'||b.type==='HOUSE_MED'||b.type==='HOUSE_BIG'){
                    let bx=(b.x+b.def.w/2)*TILE,by=(b.y+b.def.h/2)*TILE;
                    let d=dist(this.x,this.y,bx,by);
                    if(d<dd){dd=d;dest={x:bx,y:by}}
                }
            }
            if(!dest){this.state='searching';break}
            this.moveTarget=dest;
            if(dd<=TILE*2){this.state='delivering'}
            break;
        }
        case 'delivering':{
            gs.resources.food+=this.carrying;
            addParticle(this.x,this.y-16,'+'+this.carrying+' comida','#2ecc71');
            addMessage('[+] Caçador trouxe '+this.carrying+' comida!');
            this.carrying=0;
            this.state='searching';this.moveTarget=null;
            break;
        }
        }

        // Movement
        let moving=false;
        if(this.moveTarget&&this.state!=='delivering'){
            let dx=this.moveTarget.x-this.x,dy=this.moveTarget.y-this.y;
            let d=Math.sqrt(dx*dx+dy*dy);
            if(d>8){
                moving=true;
                let nx=this.x+(dx/d)*this.speed*TILE*dt;
                let ny=this.y+(dy/d)*this.speed*TILE*dt;
                let t=w2t(nx,ny);
                if(t.x>=0&&t.x<MAP_W&&t.y>=0&&t.y<MAP_H){
                    let ter=gs.map[t.y][t.x];
                    if(ter!==T.MOUNTAIN){this.x=nx;this.y=ny}
                }
                if(Math.abs(dx)>Math.abs(dy))this.dir=dx>0?3:2;
                else this.dir=dy>0?0:1;
            } else {this.moveTarget=null}
        }

        if(this.state==='attacking')this.animState='attack';
        else if(moving)this.animState='walk';
        else this.animState='idle';
    }
    draw(){
        let sx=this.x-gs.camera.x,sy=this.y-gs.camera.y;
        let sz=TILE+4;
        // Try custom hunter sprite first, fallback to archer sheet
        if(this.flashTimer>0)ctx.globalAlpha=0.5+(Math.sin(gs.gameTime*40)*0.5);
        let drawn=false;
        // Attempt custom spritesheet
        if(SC.cacador&&SC.cacador.complete&&SC.cacador.naturalWidth){
            let fw=SC.cacador.naturalWidth,fh=SC.cacador.naturalHeight;
            let fcols=Math.max(1,Math.floor(fw/CHAR_FW));
            let frows=Math.max(1,Math.floor(fh/CHAR_FH));
            if(fcols>1||frows>1){
                let f=this.animFrame%fcols;
                let row=frows>1?(DIR_TO_ROW[this.dir]||0):0;
                if(row<frows) ctx.drawImage(SC.cacador,f*CHAR_FW,row*CHAR_FH,CHAR_FW,CHAR_FH,sx-sz/2,sy-sz/2,sz,sz);
                else ctx.drawImage(SC.cacador,f*CHAR_FW,0,CHAR_FW,CHAR_FH,sx-sz/2,sy-sz/2,sz,sz);
                drawn=true;
            } else {
                // Single image - draw directly
                ctx.drawImage(SC.cacador,sx-sz/2,sy-sz/2,sz,sz);
                drawn=true;
            }
        }
        if(!drawn){
            let sheet=SC[UNIT_SHEET_MAP['ARCHER']];
            drawCharSheet(sheet,this.animState,this.dir,this.animFrame,sx-sz/2,sy-sz/2,sz);
        }
        ctx.globalAlpha=1;
        // Carry indicator
        if(this.carrying>0){
            ctx.fillStyle='#FF9944';ctx.font='bold 10px monospace';ctx.textAlign='center';
            ctx.fillText('🍖'+this.carrying,sx,sy-TILE/2-12);ctx.textAlign='left';
        }
        if(this.selected){
            ctx.strokeStyle='#0F0';ctx.lineWidth=2;
            ctx.strokeRect(sx-sz/2-2,sy-sz/2-2,sz+4,sz+4);
        }
        drawHP(sx-TILE/2,sy-TILE/2-8,TILE,4,this.hp,this.maxHp);
    }
}

class Building{
    constructor(x,y,type){
        this.x=x;this.y=y;this.type=type;this.def=BUILD[type]||VAMP_BUILD[type]||{w:1,h:1,hp:100,icon:'?',cost:{gold:0},popCap:0,workers:0};
        this.hp=this.def.hp;this.maxHp=this.def.hp;
        if(type==='WALL'){this.hp+=gs.upgrades.masonry*90;this.maxHp+=gs.upgrades.masonry*90}
        if(type==='TOWER'){this.hp+=gs.upgrades.masonry*70;this.maxHp+=gs.upgrades.masonry*70}
        this.attackTimer=0;
    }
    update(dt){
        if(this.hp<=0)return;
        // Torre e Torre Sombria atacam inimigos/player
        if((this.type==='TOWER'||this.type==='DARK_TOWER')&&this.def.attack){
            this.attackTimer-=dt;
            if(this.attackTimer<=0){
                let bx=this.x*TILE+TILE/2,by=this.y*TILE+TILE/2;
                let range=this.def.range*TILE;
                let targets=this.type==='DARK_TOWER'?[...gs.units,gs.king].filter(Boolean):gs.enemies;
                for(let e of targets){
                    if(!e||!e.alive)continue;
                    let d=dist(bx,by,e.x,e.y);
                    if(d<=range){
                        e.takeDamage(this.def.attack);
                        gs.projectiles.push({x:bx,y:by-8,tx:e.x,ty:e.y-8,timer:0.25,color:this.type==='DARK_TOWER'?'#CC00CC':'#FFA500'});
                        this.attackTimer=1.5;break;
                    }
                }
            }
        }
    }
    draw(){
        let sx=this.x*TILE-gs.camera.x,sy=this.y*TILE-gs.camera.y;
        if(this.type==='WALL'){
            this._drawConnectedWall(sx,sy);
        } else {
            let spr=SC[this.type.toLowerCase()];
            if(spr) ctx.drawImage(spr,sx,sy);
            else{
                // Fallback for unknown building types
                ctx.fillStyle='#444';ctx.fillRect(sx,sy,this.def.w*TILE,this.def.h*TILE);
                ctx.font='10px monospace';ctx.fillStyle='#FFF';ctx.textAlign='center';
                ctx.fillText(this.def.icon||'?',sx+this.def.w*TILE/2,sy+this.def.h*TILE/2+4);
                ctx.textAlign='left';
            }
        }
        if(this.hp<this.maxHp){
            drawHP(sx,sy-8,this.def.w*TILE,5,this.hp,this.maxHp);
        }
        // Selection highlight
        if(gs.selectedBuilding===this||gs.selectedBuildings.includes(this)){
            ctx.strokeStyle='#FFD700';ctx.lineWidth=2;ctx.setLineDash([4,4]);
            ctx.strokeRect(sx-2,sy-2,this.def.w*TILE+4,this.def.h*TILE+4);
            ctx.setLineDash([]);
        }
        // Range indicator para torre
        if(this.type==='TOWER'&&(gs.buildMode||gs.selectedBuilding===this)){
            ctx.strokeStyle='rgba(255,165,0,0.3)';ctx.lineWidth=1;
            ctx.beginPath();
            ctx.arc(sx+TILE/2,sy+TILE/2,this.def.range*TILE,0,Math.PI*2);
            ctx.stroke();
        }
    }
    _drawConnectedWall(sx,sy){
        let bs=gs.buildings;
        let wl=b=>(b.type==='WALL'||b.type==='TOWER')&&b.hp>0;
        let n=bs.some(b=>wl(b)&&b.x===this.x&&b.y===this.y-1);
        let s=bs.some(b=>wl(b)&&b.x===this.x&&b.y===this.y+1);
        let e=bs.some(b=>wl(b)&&b.x===this.x+1&&b.y===this.y);
        let w=bs.some(b=>wl(b)&&b.x===this.x-1&&b.y===this.y);
        // Core block
        let cx=sx+6,cy=sy+6,cw=20,ch=20;
        if(n){cy=sy;ch+=6} if(s){ch+=6}
        if(w){cx=sx;cw+=6} if(e){cw+=6}
        ctx.fillStyle='#808080';ctx.fillRect(cx,cy,cw,ch);
        ctx.fillStyle='#909090';ctx.fillRect(cx+2,cy+2,cw-4,ch-4);
        // Battlements on exposed edges
        ctx.fillStyle='#606060';
        if(!n){ctx.fillRect(sx+4,sy+2,6,5);ctx.fillRect(sx+14,sy+2,6,5);ctx.fillRect(sx+22,sy+2,6,5)}
        if(!s){ctx.fillRect(sx+4,sy+25,6,5);ctx.fillRect(sx+14,sy+25,6,5);ctx.fillRect(sx+22,sy+25,6,5)}
        if(!e){ctx.fillRect(sx+26,sy+4,5,6);ctx.fillRect(sx+26,sy+14,5,6);ctx.fillRect(sx+26,sy+22,5,6)}
        if(!w){ctx.fillRect(sx+1,sy+4,5,6);ctx.fillRect(sx+1,sy+14,5,6);ctx.fillRect(sx+1,sy+22,5,6)}
        // Brick detail
        ctx.fillStyle='#A0A0A0';
        ctx.fillRect(sx+10,sy+10,5,3);ctx.fillRect(sx+17,sy+17,5,3);
        ctx.fillRect(sx+17,sy+10,5,3);ctx.fillRect(sx+10,sy+19,5,3);
        // Top shadow
        ctx.fillStyle='#6A6A6A';ctx.fillRect(cx,cy,cw,2);
    }
}

function addParticle(x,y,text,color){
    gs.particles.push({x,y,text,color,vy:-40,life:1.8,maxLife:1.8});
}
function addExplosion(x,y){
    gs.explosions.push({x,y,radius:2,maxRadius:12,life:0.3});
}
function addMessage(text){
    gs.messages.push({text,timer:3.5});
    if(gs.messages.length>5) gs.messages.shift();
}

function updateEffects(dt){
    for(let i=gs.particles.length-1;i>=0;i--){
        let p=gs.particles[i];
        p.y+=p.vy*dt;p.life-=dt;
        if(p.life<=0) gs.particles.splice(i,1);
    }
    for(let i=gs.projectiles.length-1;i>=0;i--){
        gs.projectiles[i].timer-=dt;
        if(gs.projectiles[i].timer<=0) gs.projectiles.splice(i,1);
    }
    for(let i=gs.explosions.length-1;i>=0;i--){
        let e=gs.explosions[i];
        e.life-=dt;e.radius=e.maxRadius*(1-e.life/0.3);
        if(e.life<=0) gs.explosions.splice(i,1);
    }
    for(let i=gs.messages.length-1;i>=0;i--){
        gs.messages[i].timer-=dt;
        if(gs.messages[i].timer<=0) gs.messages.splice(i,1);
    }
    if(gs.screenShake>0) gs.screenShake-=dt*4;
}

function drawHP(x,y,w,h,hp,max){
    let r=hp/max;
    ctx.fillStyle='#222';ctx.fillRect(x,y,w,h);
    ctx.fillStyle=r>0.6?'#2ecc71':r>0.3?'#f39c12':'#e74c3c';
    ctx.fillRect(x+1,y+1,(w-2)*r,h-2);
    ctx.strokeStyle='#000';ctx.lineWidth=1;ctx.strokeRect(x,y,w,h);
}

function canBuild(tx,ty,def,exclude){
    for(let dy=0;dy<def.h;dy++){for(let dx=0;dx<def.w;dx++){
        let x=tx+dx,y=ty+dy;
        if(x<0||x>=MAP_W||y<0||y>=MAP_H) return false;
        let ter=gs.map[y][x];
        if(ter===T.WATER||ter===T.MOUNTAIN) return false;
        let terr=getTerritoryByTile(x,y);
        if(!terr||terr.owner!==OWNER.PLAYER) return false;
        for(let b of gs.buildings){
            if(b.hp<=0||b===exclude)continue;
            if(x>=b.x&&x<b.x+b.def.w&&y>=b.y&&y<b.y+b.def.h) return false;
        }
    }}
    if(def.needsWater){
        let hw=false;
        for(let dy=-1;dy<=def.h;dy++){for(let dx=-1;dx<=def.w;dx++){
            let x=tx+dx,y=ty+dy;
            if(x>=0&&x<MAP_W&&y>=0&&y<MAP_H&&gs.map[y][x]===T.WATER)hw=true;
        }}
        if(!hw)return false;
    }
    if(def.needsRock){
        let hr=false;
        for(let dy=-3;dy<=def.h+2;dy++)for(let dx=-3;dx<=def.w+2;dx++){
            let x=tx+dx,y=ty+dy;
            if(x>=0&&x<MAP_W&&y>=0&&y<MAP_H&&gs.stoneNodes[nodeKey(x,y)]) hr=true;
        }
        if(!hr) return false;
    }
    return true;
}
function canAfford(c){
    return gs.resources.gold>=(c.gold||0)&&gs.resources.food>=(c.food||0)&&gs.resources.wood>=(c.wood||0)&&gs.resources.stone>=(c.stone||0);
}
function spend(c){
    gs.resources.gold-=(c.gold||0);
    gs.resources.food-=(c.food||0);
    gs.resources.wood-=(c.wood||0);
    gs.resources.stone-=(c.stone||0);
}
function hasBarracks(){return gs.buildings.some(b=>b.type==='BARRACKS'&&b.hp>0)}

function upgradeForge(){
    let lv=gs.upgrades.forge;
    let cost={gold:120+lv*90,wood:20+lv*15,stone:40+lv*35};
    if(lv>=5){addMessage('[i] Forja já está no nível máximo.');return}
    if(!canAfford(cost)){addMessage('[x] Recursos insuficientes para forjar espadas.');return}
    spend(cost);
    gs.upgrades.forge++;
    for(let u of gs.units){u.atk+=3;}
    addMessage('[+] Forja melhorada! Espadas nível '+gs.upgrades.forge);
}

function upgradeMasonry(){
    let lv=gs.upgrades.masonry;
    let cost={gold:100+lv*80,wood:45+lv*20,stone:65+lv*45};
    if(lv>=5){addMessage('[i] Alvenaria já está no nível máximo.');return}
    if(!canAfford(cost)){addMessage('[x] Recursos insuficientes para reforçar muralhas.');return}
    spend(cost);
    gs.upgrades.masonry++;
    for(let b of gs.buildings){
        if(b.type==='WALL'){b.maxHp+=90;b.hp+=90}
        if(b.type==='TOWER'){b.maxHp+=70;b.hp+=70}
    }
    addMessage('[+] Muralhas reforçadas! Nível '+gs.upgrades.masonry);
}

function recruitUnit(type){
    if(!hasBarracks()){addMessage('[x] Construa um Quartel primeiro!');return}
    let def=UDEF[type];
    if(!canAfford(def.cost)){addMessage('[x] Recursos insuficientes!');return}
    let popNeeded=def.cost.pop||0;
    if(popNeeded>0&&getAvailablePop()<popNeeded){addMessage('[x] População insuficiente! Construa mais casas.');return}
    let bar=gs.buildings.find(b=>b.type==='BARRACKS'&&b.hp>0);
    if(!bar)return;
    spend(def.cost);
    let ux=bar.x*TILE+bar.def.w*TILE+TILE+rand(-10,10);
    let uy=bar.y*TILE+TILE+rand(-10,10);
    if(type==='HUNTER'){
        gs.units.push(new Hunter(ux,uy));
    } else {
        gs.units.push(new PlayerUnit(ux,uy,type));
    }
    addMessage('[+] '+def.name+' recrutado!');
}

function diploKey(a,b){return Math.min(a,b)+'_'+Math.max(a,b)}
function initDiplomacy(){
    gs.diplomacy={};
    let all=[OWNER.PLAYER,OWNER.ENEMY_A,OWNER.ENEMY_B,OWNER.VAMPIRES];
    for(let i=0;i<all.length;i++){
        for(let j=i+1;j<all.length;j++){
            let k=diploKey(all[i],all[j]);
            // Vampires at war with everyone initially
            if(all[i]===OWNER.VAMPIRES||all[j]===OWNER.VAMPIRES) gs.diplomacy[k]=DIPLO.WAR;
            // Player at war with barbarians and mages initially
            else if(all[i]===OWNER.PLAYER||all[j]===OWNER.PLAYER) gs.diplomacy[k]=DIPLO.WAR;
            // AI kingdoms neutral to each other
            else gs.diplomacy[k]=DIPLO.NEUTRAL;
        }
    }
}
function getDiplo(a,b){if(a===b)return DIPLO.ALLIANCE;return gs.diplomacy[diploKey(a,b)]||DIPLO.NEUTRAL}
function setDiplo(a,b,state){gs.diplomacy[diploKey(a,b)]=state}
function isAtWar(a,b){return getDiplo(a,b)===DIPLO.WAR}
function declareWar(a,b){
    setDiplo(a,b,DIPLO.WAR);
    let nameA=OWNER_NAMES[a]||'?',nameB=OWNER_NAMES[b]||'?';
    addMessage('[!] '+nameA+' declarou guerra ao '+nameB+'!');
}
function makeAlliance(a,b){
    setDiplo(a,b,DIPLO.ALLIANCE);
    let nameA=OWNER_NAMES[a]||'?',nameB=OWNER_NAMES[b]||'?';
    addMessage('[+] '+nameA+' fez aliança com '+nameB+'!');
}
function makePeace(a,b){
    setDiplo(a,b,DIPLO.PEACE);
    let nameA=OWNER_NAMES[a]||'?',nameB=OWNER_NAMES[b]||'?';
    addMessage('[~] '+nameA+' fez paz com '+nameB+'!');
}

// CICLO DIA/NOITE
// ═══════════════════════════════════════════════════════════
function updateDayNight(dt){
    gs.dayNightTimer+=dt;
    if(gs.dayNightTimer>=DAY_CYCLE) gs.dayNightTimer-=DAY_CYCLE;
    let wasNight=gs.isNight;
    gs.isNight=gs.dayNightTimer>=(DAY_CYCLE*0.55); // 55% dia, 45% noite
    if(gs.isNight&&!wasNight) addMessage('[!] A noite caiu... Vampiros ficam mais fortes!');
    if(!gs.isNight&&wasNight) addMessage('[~] O sol nasceu. Vampiros estão enfraquecidos.');
}
function getNightAlpha(){
    if(!gs.isNight) return 0;
    let nightStart=DAY_CYCLE*0.55,nightEnd=DAY_CYCLE;
    let t=(gs.dayNightTimer-nightStart)/(nightEnd-nightStart);
    // Fade in/out
    if(t<0.1) return t/0.1*0.35;
    if(t>0.9) return (1-(t-0.9)/0.1)*0.35;
    return 0.35;
}

// ═══════════════════════════════════════════════════════════
// EVENTOS ALEATÓRIOS
// ═══════════════════════════════════════════════════════════
function updateRandomEvents(dt){
    gs.eventTimer+=dt;
    if(gs.eventTimer<60) return;
    gs.eventTimer=0;
    let roll=Math.random();

    // Ataque noturno de vampiros
    if(gs.isNight&&roll<0.35){
        let vampTerr=getOwnerTerritories(OWNER.VAMPIRES);
        let playerTerr=getOwnerTerritories(OWNER.PLAYER);
        if(vampTerr.length>0&&playerTerr.length>0){
            // Spawn vampire raid near player
            let target=playerTerr[randInt(0,playerTerr.length-1)];
            let cx=(target.x*TERR_TILE+TERR_TILE/2)*TILE;
            let cy=(target.y*TERR_TILE+TERR_TILE/2)*TILE;
            let types=['vamp_warrior','vamp_warrior','vamp_warrior','giant_bat','giant_bat'];
            if(gs.waveNumber>=3) types.push('vamp_lord');
            for(let i=0;i<types.length;i++){
                gs.enemies.push(new EnemyUnit(cx+rand(-80,80),cy+rand(-80,80),types[i]));
            }
            addMessage('[!] Ataque noturno dos vampiros!');
            gs.screenShake=0.5;
        }
        return;
    }
    // Invasão surpresa de um reino IA
    if(roll<0.5){
        let aiOwners=[OWNER.ENEMY_A,OWNER.ENEMY_B,OWNER.VAMPIRES];
        let attacker=aiOwners[randInt(0,aiOwners.length-1)];
        let targets=aiOwners.filter(o=>o!==attacker&&isAtWar(attacker,o));
        if(targets.length>0){
            let defender=targets[randInt(0,targets.length-1)];
            let atkTerr=getOwnerTerritories(attacker);
            let defTerr=getOwnerTerritories(defender);
            if(atkTerr.length>0&&defTerr.length>0){
                let from=atkTerr[randInt(0,atkTerr.length-1)];
                let to=defTerr[randInt(0,defTerr.length-1)];
                spawnArmy(attacker,{SWORDSMAN:randInt(4,8),ARCHER:randInt(3,6),SPEARMAN:randInt(3,6)},from,to);
                let aN=OWNER_NAMES[attacker]||'?',dN=OWNER_NAMES[defender]||'?';
                addMessage('[!] '+aN+' invadiu o '+dN+'!');
            }
        }
        return;
    }
    // Guerra espontânea entre reinos neutros
    if(roll<0.65){
        let pairs=[[OWNER.ENEMY_A,OWNER.ENEMY_B],[OWNER.ENEMY_A,OWNER.VAMPIRES],[OWNER.ENEMY_B,OWNER.VAMPIRES]];
        let pair=pairs[randInt(0,pairs.length-1)];
        if(getDiplo(pair[0],pair[1])===DIPLO.NEUTRAL){
            declareWar(pair[0],pair[1]);
        }
    }
}

function initVampireStructures(){
    // Localizar centro do território vampiro (nordeste)
    let vTerr=getOwnerTerritories(OWNER.VAMPIRES);
    if(vTerr.length===0) return;
    let avgX=0,avgY=0;
    for(let t of vTerr){avgX+=t.x;avgY+=t.y}
    avgX=Math.floor(avgX/vTerr.length)*TERR_TILE+TERR_TILE/2;
    avgY=Math.floor(avgY/vTerr.length)*TERR_TILE+TERR_TILE/2;

    // Limpar terreno ao redor do castelo vampiro
    for(let dy=-5;dy<=5;dy++)for(let dx=-5;dx<=5;dx++){
        let ny=avgY+dy,nx=avgX+dx;
        if(ny>=0&&ny<MAP_H&&nx>=0&&nx<MAP_W){
            gs.map[ny][nx]=T.GRASS;
            delete gs.treeNodes[nodeKey(nx,ny)];
        }
    }

    // Colocar construções vampiras
    gs.buildings.push(new Building(avgX-1,avgY-1,'VAMP_CASTLE'));
    gs.buildings.push(new Building(avgX-4,avgY-1,'VAMP_LAIR'));
    gs.buildings.push(new Building(avgX+3,avgY,'CEMETERY'));
    gs.buildings.push(new Building(avgX-3,avgY+3,'DARK_TOWER'));
    gs.buildings.push(new Building(avgX+3,avgY+3,'DARK_TOWER'));
    gs.buildings.push(new Building(avgX+3,avgY-3,'DARK_TOWER'));
}

function initTerritories(){
    gs.territories=[];
    for(let ty=0;ty<TERR_H;ty++){
        for(let tx=0;tx<TERR_W;tx++){
            gs.territories.push({x:tx,y:ty,owner:OWNER.NEUTRAL,control:40,resource:1+((tx+ty)%2)});
        }
    }
    let pcx=Math.floor(TERR_W/2),pcy=Math.floor(TERR_H/2);
    for(let dy=-1;dy<=1;dy++)for(let dx=-1;dx<=1;dx++){
        let x=clamp(pcx+dx,0,TERR_W-1),y=clamp(pcy+dy,0,TERR_H-1);
        let t=gs.territories[terrIndex(x,y)];t.owner=OWNER.PLAYER;t.control=100;
    }
    for(let dy=0;dy<=1;dy++)for(let dx=0;dx<=1;dx++){
        gs.territories[terrIndex(dx,dy)].owner=OWNER.ENEMY_A;
        gs.territories[terrIndex(dx,dy)].control=100;
    }
    for(let dy=0;dy<=1;dy++)for(let dx=0;dx<=1;dx++){
        let x=TERR_W-1-dx,y=TERR_H-1-dy;
        gs.territories[terrIndex(x,y)].owner=OWNER.ENEMY_B;
        gs.territories[terrIndex(x,y)].control=100;
    }
    // Vampires: northeast corner 2x2
    for(let dy=0;dy<=1;dy++)for(let dx=0;dx<=1;dx++){
        let x=TERR_W-1-dx,y=dy;
        gs.territories[terrIndex(x,y)].owner=OWNER.VAMPIRES;
        gs.territories[terrIndex(x,y)].control=100;
    }
}

function initKingdoms(){
    gs.kingdoms=[
        {owner:OWNER.ENEMY_A,name:'Reino dos Bárbaros',gold:220,food:180,wood:170,expandCd:12,attackCd:30},
        {owner:OWNER.ENEMY_B,name:'Reino dos Magos',gold:220,food:180,wood:170,expandCd:15,attackCd:36},
        {owner:OWNER.VAMPIRES,name:'Reino dos Vampiros',gold:300,food:0,wood:100,expandCd:18,attackCd:25}
    ];
}

function getOwnerTerritories(owner){
    return gs.territories.filter(t=>t.owner===owner);
}

function spawnArmy(owner, comp, fromTerr, toTerr){
    let start=getTerritoryCenterWorld(fromTerr.x,fromTerr.y);
    let end=getTerritoryCenterWorld(toTerr.x,toTerr.y);
    gs.armies.push({
        owner,
        x:start.x,y:start.y,
        tx:end.x,ty:end.y,
        speed:owner===OWNER.PLAYER?1.75:1.35,
        comp:{SWORDSMAN:comp.SWORDSMAN||0,ARCHER:comp.ARCHER||0,SPEARMAN:comp.SPEARMAN||0},
        targetTerritory:{x:toTerr.x,y:toTerr.y}
    });
}

function conquerTerritory(army,territory){
    let defenderPower=0.8;
    let buildingsIn=gs.buildings.filter(b=>b.hp>0&&tileToTerr(b.x,b.y).x===territory.x&&tileToTerr(b.x,b.y).y===territory.y);
    defenderPower+=buildingsIn.length*0.25;
    let posBonus=gs.map[territory.y*TERR_TILE]?.[territory.x*TERR_TILE]===T.FOREST?0.12:0.05;
    let atkPower=armyPower(army.comp,posBonus);
    if(army.owner===OWNER.PLAYER) atkPower*=1+(gs.upgrades.forge*0.08);
    // Vampire night bonus for army conquest
    if(army.owner===OWNER.VAMPIRES&&gs.isNight) atkPower*=1.3;
    if(army.owner===OWNER.VAMPIRES&&!gs.isNight) atkPower*=0.75;
    if(atkPower>defenderPower){
        let prevOwner=territory.owner;
        territory.owner=army.owner;
        territory.control=100;
        addMessage((army.owner===OWNER.PLAYER?'[+] ':'[!] ')+'Território conquistado por '+(OWNER_NAMES[army.owner]||'desconhecido')+'!');
        // Check if main castle of previous owner was in this territory - eliminate kingdom
        if(prevOwner!==OWNER.NEUTRAL&&prevOwner!==OWNER.PLAYER){
            let castleTypes=['CASTLE','VAMP_CASTLE'];
            for(let b of buildingsIn){
                if(castleTypes.includes(b.type)&&b.hp>0){
                    b.hp=0;
                    // Transfer all territories of eliminated kingdom
                    let remaining=getOwnerTerritories(prevOwner);
                    for(let t of remaining){t.owner=army.owner;t.control=80}
                    addMessage('[!!] '+(OWNER_NAMES[prevOwner]||'Reino')+ ' foi conquistado!');
                    break;
                }
            }
        }
    }else{
        territory.control=Math.max(15,territory.control-15);
    }
}

function updateArmies(dt){
    for(let i=gs.armies.length-1;i>=0;i--){
        let a=gs.armies[i];
        let dx=a.tx-a.x,dy=a.ty-a.y;
        let d=Math.sqrt(dx*dx+dy*dy);
        if(d>6){
            a.x+=(dx/d)*a.speed*TILE*dt;
            a.y+=(dy/d)*a.speed*TILE*dt;
        }else{
            let tt=gs.territories[terrIndex(a.targetTerritory.x,a.targetTerritory.y)];
            if(tt&&tt.owner!==a.owner) conquerTerritory(a,tt);
            gs.armies.splice(i,1);
        }
    }

    // Batalha automatica entre exercitos
    for(let i=0;i<gs.armies.length;i++){
        for(let j=i+1;j<gs.armies.length;j++){
            let a=gs.armies[i],b=gs.armies[j];
            if(a.owner===b.owner) continue;
            if(!isAtWar(a.owner,b.owner)) continue;
            if(dist(a.x,a.y,b.x,b.y)<28){
                let terrA=getTerritoryByWorld(a.x,a.y);
                let terrB=getTerritoryByWorld(b.x,b.y);
                let aPos=(terrA&&terrA.owner===a.owner)?0.12:0.03;
                let bPos=(terrB&&terrB.owner===b.owner)?0.12:0.03;
                let pa=armyPower(a.comp,aPos),pb=armyPower(b.comp,bPos);
                if(a.owner===OWNER.PLAYER) pa*=1+(gs.upgrades.forge*0.08);
                if(b.owner===OWNER.PLAYER) pb*=1+(gs.upgrades.forge*0.08);
                let winner=pa>=pb?a:b;
                let loser=winner===a?b:a;
                winner.comp.SWORDSMAN=Math.max(0,winner.comp.SWORDSMAN-Math.floor((loser.comp.SWORDSMAN||0)*0.45));
                winner.comp.ARCHER=Math.max(0,winner.comp.ARCHER-Math.floor((loser.comp.ARCHER||0)*0.45));
                winner.comp.SPEARMAN=Math.max(0,winner.comp.SPEARMAN-Math.floor((loser.comp.SPEARMAN||0)*0.45));
                addExplosion((a.x+b.x)/2,(a.y+b.y)/2);
                addMessage('[!] Batalha de exércitos: '+(winner.owner===OWNER.PLAYER?'Jogador venceu':'Inimigo venceu'));
                gs.armies.splice(gs.armies.indexOf(loser),1);
                if(armyCount(winner.comp)<=0) gs.armies.splice(gs.armies.indexOf(winner),1);
                return;
            }
        }
    }
}

function updateTerritoryEconomy(dt){
    gs.territoryTimer+=dt;
    if(gs.territoryTimer<6) return;
    gs.territoryTimer=0;
    let playerTerr=getOwnerTerritories(OWNER.PLAYER).length;
    gs.resources.gold+=Math.floor(playerTerr*1.2);
    gs.resources.food+=Math.floor(playerTerr*0.8);
    gs.resources.wood+=Math.floor(playerTerr*0.7);
}

function updateKingdomAI(dt){
    gs.aiTimer+=dt;
    if(gs.aiTimer<1.5) return;
    gs.aiTimer=0;
    for(let k of gs.kingdoms){
        k.expandCd-=1.5;k.attackCd-=1.5;
        let isVamp=k.owner===OWNER.VAMPIRES;
        // Vampire kingdoms are more aggressive at night
        let aggroMod=isVamp?(gs.isNight?0.6:1.4):1;

        if(k.expandCd<=0){
            let owned=getOwnerTerritories(k.owner);
            if(owned.length>0){
                let from=owned[randInt(0,owned.length-1)];
                let candidates=[];
                let dirs=[[1,0],[-1,0],[0,1],[0,-1]];
                for(let d of dirs){
                    let nx=from.x+d[0],ny=from.y+d[1];
                    if(nx>=0&&nx<TERR_W&&ny>=0&&ny<TERR_H){
                        let t=gs.territories[terrIndex(nx,ny)];
                        if(t.owner!==k.owner){
                            // Only expand into neutral or war targets
                            if(t.owner===OWNER.NEUTRAL||isAtWar(k.owner,t.owner))
                                candidates.push(t);
                        }
                    }
                }
                if(candidates.length>0){
                    let to=candidates[randInt(0,candidates.length-1)];
                    let comp=isVamp?
                        {SWORDSMAN:randInt(4,8),ARCHER:randInt(1,3),SPEARMAN:randInt(2,5)}:
                        {SWORDSMAN:randInt(3,7),ARCHER:randInt(2,5),SPEARMAN:randInt(2,5)};
                    spawnArmy(k.owner,comp,from,to);
                }
            }
            k.expandCd=(12+rand(0,10))*aggroMod;
        }

        if(k.attackCd<=0){
            // Find war targets
            let warTargets=[];
            let allOwners=[OWNER.PLAYER,OWNER.ENEMY_A,OWNER.ENEMY_B,OWNER.VAMPIRES];
            for(let o of allOwners){
                if(o===k.owner)continue;
                if(isAtWar(k.owner,o)){
                    let tt=getOwnerTerritories(o);
                    if(tt.length>0) warTargets.push({owner:o,terrs:tt});
                }
            }
            let owned=getOwnerTerritories(k.owner);
            if(warTargets.length>0&&owned.length>0){
                let target=warTargets[randInt(0,warTargets.length-1)];
                let from=owned[randInt(0,owned.length-1)];
                let to=target.terrs[randInt(0,target.terrs.length-1)];
                let comp=isVamp?
                    {SWORDSMAN:randInt(6,12),ARCHER:randInt(2,5),SPEARMAN:randInt(4,8)}:
                    {SWORDSMAN:randInt(5,10),ARCHER:randInt(4,8),SPEARMAN:randInt(4,8)};
                spawnArmy(k.owner,comp,from,to);
                if(target.owner===OWNER.PLAYER)
                    addMessage('[!] '+k.name+' enviou um exército de invasão!');
            }
            k.attackCd=(26+rand(0,12))*aggroMod;
        }
    }
}

function initRuins(){
    gs.ruins=[];
    let placed=0,tries=0;
    let cx=Math.floor(MAP_W/2),cy=Math.floor(MAP_H/2);
    while(placed<34&&tries<800){
        tries++;
        let tx=randInt(3,MAP_W-4),ty=randInt(3,MAP_H-4);
        let ter=gs.map[ty][tx];
        if(ter===T.WATER||ter===T.MOUNTAIN||ter===T.FOREST) continue;
        if(dist(tx,ty,cx,cy)<15) continue;
        if(gs.ruins.some(r=>dist(tx,ty,r.x,r.y)<4)) continue;
        gs.ruins.push({x:tx,y:ty,variant:hash(tx,ty)%SC.ruins.length,size:(hash(ty,tx)%2===0)?2:1});
        placed++;
    }
}

function nodeKey(x,y){return x+'|'+y}
function findNearestNode(nodes,tx,ty,maxDist){
    let best=null,bestD=Infinity;
    for(let k in nodes){
        let n=nodes[k];
        if(!n||n.hp<=0)continue;
        let d=Math.abs(n.x-tx)+Math.abs(n.y-ty);
        if(d<=maxDist&&d<bestD){best=n;bestD=d;}
    }
    return best;
}

function initResourceNodes(){
    gs.treeNodes={};
    gs.stoneNodes={};
    for(let y=0;y<MAP_H;y++)for(let x=0;x<MAP_W;x++){
        let ter=gs.map[y][x];
        if(ter===T.FOREST&&Math.random()<0.55){
            gs.treeNodes[nodeKey(x,y)]={x,y,hp:rand(3,6),variant:hash(x,y)%SC.pngTrees.length};
        }
        if(ter===T.MOUNTAIN&&Math.random()<0.45){
            gs.stoneNodes[nodeKey(x,y)]={x,y,hp:rand(5,9),variant:hash(y,x)%SC.rockNodes.length,size:(hash(x*3,y*7)%2===0)?1:2};
        }
    }
}

function unitsToArmy(units,targetOwner){
    if(!units.length) return;
    let validUnits=units.filter(u=>u.type!=='HUNTER');
    if(!validUnits.length) return;
    let comp={SWORDSMAN:0,ARCHER:0,SPEARMAN:0};
    let mx=0,my=0;
    for(let u of validUnits){comp[u.type]=(comp[u.type]||0)+1;mx+=u.x;my+=u.y;}
    mx/=validUnits.length;my/=validUnits.length;
    let from=worldToTerr(mx,my);
    let to=targetOwner||from;
    spawnArmy(OWNER.PLAYER,comp,{x:from.x,y:from.y},{x:to.x,y:to.y});
    gs.units=gs.units.filter(u=>!validUnits.includes(u));
    gs.selectedUnits=[];
    addMessage('[+] Exército do jogador mobilizado!');
}

// ═══════════════════════════════════════════════════════════
// SISTEMAS DE POPULAÇÃO E ECONOMIA
// ═══════════════════════════════════════════════════════════
function getPopCap(){
    return gs.buildings.reduce((s,b)=>b.hp>0?(s+(b.def.popCap||0)):s,0);
}
function getWorkersNeeded(){
    return gs.buildings.reduce((s,b)=>b.hp>0?(s+(b.def.workers||0)):s,0);
}
function getAvailablePop(){
    let used=gs.units.filter(u=>u.alive).length;
    return gs.population-used;
}
function getProductionMultiplier(){
    if(gs.hunger>=3)return 0.25;
    if(gs.hunger>=2)return 0.5;
    if(gs.hunger>=1)return 0.75;
    return 1;
}
function getCombatMultiplier(){
    if(gs.hunger>=3)return 0.5;
    if(gs.hunger>=2)return 0.7;
    if(gs.hunger>=1)return 0.85;
    return 1;
}
function updatePopulation(dt){
    gs.popCap=getPopCap();
    gs.popGrowthTimer+=dt;
    if(gs.popGrowthTimer>=8){
        gs.popGrowthTimer=0;
        if(gs.population<gs.popCap&&gs.resources.food>0&&gs.hunger<2){
            gs.population++;
        }
    }
}
function updateHunger(dt){
    gs.foodConsumptionTimer+=dt;
    if(gs.foodConsumptionTimer>=5){
        gs.foodConsumptionTimer=0;
        let consumption=Math.ceil(gs.population*0.3);
        gs.resources.food-=consumption;
        if(gs.resources.food<0)gs.resources.food=0;
        let prevHunger=gs.hunger;
        if(gs.resources.food<=0){
            gs.hungerTimer+=5;
            if(gs.hungerTimer>30)gs.hunger=3;
            else if(gs.hungerTimer>20)gs.hunger=2;
            else if(gs.hungerTimer>10)gs.hunger=1;
        }else{
            gs.hungerTimer=Math.max(0,gs.hungerTimer-5);
            if(gs.hungerTimer<=0)gs.hunger=0;
            else if(gs.hungerTimer<=10)gs.hunger=Math.min(gs.hunger,1);
            else if(gs.hungerTimer<=20)gs.hunger=Math.min(gs.hunger,2);
        }
        if(gs.hunger>prevHunger){
            if(gs.hunger>=3)addMessage('[!!] Fome extrema! Pessoas estão morrendo!');
            else if(gs.hunger>=2)addMessage('[!] Seu povo está com fome!');
            else if(gs.hunger>=1)addMessage('[!] Reservas de comida baixas!');
        }
        if(gs.hunger>=3&&gs.population>1){
            gs.population--;
        }
    }
}
function getProductionRates(){
    let mult=getProductionMultiplier();
    let wNeeded=getWorkersNeeded();
    let wAvail=getAvailablePop();
    let wRatio=wNeeded>0?Math.min(1,Math.max(0,wAvail/wNeeded)):1;
    let rates={gold:0,food:0,wood:0,stone:0};
    for(let b of gs.buildings){
        if(b.hp<=0||!b.def.produces)continue;
        for(let res in b.def.produces)rates[res]+=b.def.produces[res]*mult*wRatio;
    }
    rates.gold=Math.round(rates.gold*12);rates.food=Math.round(rates.food*12);rates.wood=Math.round(rates.wood*12);rates.stone=Math.round(rates.stone*12);
    let pTerr=getOwnerTerritories(OWNER.PLAYER).length;
    rates.gold+=Math.round(pTerr*1.2*10);
    rates.food+=Math.round(pTerr*0.8*10);
    rates.wood+=Math.round(pTerr*0.7*10);
    rates.food-=Math.ceil(gs.population*0.3)*12;
    return rates;
}

function saveGame(){
    try{
        let mapStr=gs.map.map(r=>r.join('')).join('\n');
        let data={
            resources:gs.resources,
            buildings:gs.buildings.filter(b=>b.hp>0).map(b=>({x:b.x,y:b.y,type:b.type,hp:b.hp,maxHp:b.maxHp})),
            units:gs.units.filter(u=>u.alive).map(u=>({x:u.x,y:u.y,type:u.type,hp:u.hp})),
            king:{x:gs.king.x,y:gs.king.y,hp:gs.king.hp},
            waveNumber:gs.waveNumber,waveTimer:gs.waveTimer,gameTime:gs.gameTime,
            population:gs.population,hunger:gs.hunger,hungerTimer:gs.hungerTimer,
            map:mapStr,
            treeNodes:gs.treeNodes,
            stoneNodes:gs.stoneNodes,
            upgrades:gs.upgrades,
            territories:gs.territories,
            kingdoms:gs.kingdoms,
            armies:gs.armies,
            diplomacy:gs.diplomacy,
            dayNightTimer:gs.dayNightTimer,
            isNight:gs.isNight,
            eventTimer:gs.eventTimer
        };
        localStorage.setItem('medievalKingdom_save',JSON.stringify(data));
        addMessage('[+] Jogo salvo com sucesso!');
    }catch(er){addMessage('[x] Erro ao salvar: '+er.message)}
}
function loadGame(){
    try{
        let raw=localStorage.getItem('medievalKingdom_save');
        if(!raw){addMessage('[x] Nenhum save encontrado!');return}
        let data=JSON.parse(raw);
        gs.map=data.map.split('\n').map(r=>r.split('').map(Number));
        gs.resources={gold:data.resources.gold||0,food:data.resources.food||0,wood:data.resources.wood||0,stone:data.resources.stone||0};
        gs.upgrades=data.upgrades||{forge:0,masonry:0};
        gs.buildings=data.buildings.map(b=>{let nb=new Building(b.x,b.y,b.type);nb.maxHp=b.maxHp||nb.maxHp;nb.hp=b.hp;return nb});
        gs.units=data.units.map(u=>{
            if(u.type==='HUNTER'){let h=new Hunter(u.x,u.y);h.hp=u.hp;return h}
            let nu=new PlayerUnit(u.x,u.y,u.type);nu.hp=u.hp;return nu
        });
        gs.king.x=data.king.x;gs.king.y=data.king.y;gs.king.hp=data.king.hp;gs.king.alive=true;
        gs.waveNumber=data.waveNumber;gs.waveTimer=data.waveTimer;gs.gameTime=data.gameTime;
        gs.population=data.population||4;gs.hunger=data.hunger||0;gs.hungerTimer=data.hungerTimer||0;
        gs.treeNodes=data.treeNodes||{};
        gs.stoneNodes=data.stoneNodes||{};
        if(Object.keys(gs.treeNodes).length===0&&Object.keys(gs.stoneNodes).length===0) initResourceNodes();
        gs.territories=(data.territories&&data.territories.length)?data.territories:gs.territories;
        gs.kingdoms=(data.kingdoms&&data.kingdoms.length)?data.kingdoms:gs.kingdoms;
        gs.armies=data.armies||[];
        gs.diplomacy=data.diplomacy||{};
        gs.dayNightTimer=data.dayNightTimer||0;
        gs.isNight=data.isNight||false;
        gs.eventTimer=data.eventTimer||0;
        if(Object.keys(gs.diplomacy).length===0) initDiplomacy();
        gs.enemies=[];gs.particles=[];gs.projectiles=[];gs.explosions=[];gs.selectedUnits=[];
        gs.selectedBuilding=null;gs.selectedBuildings=[];gs.moveMode=false;gs.movingBuilding=null;gs.moveSelectionMode=false;
        gs.selectedArmies=[];gs.movingBuildings=[];
        gs.showBuildingMenu=false;gs.showBuildMenu=false;gs.showRecruitMenu=false;gs.showDiplomacy=false;
        gs.animals=[];gs.animalRespawnQueue=[];gs.animalSpawnTimer=0;initAnimals();
        addMessage('[+] Jogo carregado com sucesso!');
    }catch(er){addMessage('[x] Erro ao carregar: '+er.message)}
}

function sellBuilding(b){
    if(!b||b.type==='CASTLE'){addMessage('[x] Não é possível vender o Castelo!');return}
    let cost=b.def.cost;
    gs.resources.gold+=Math.floor((cost.gold||0)*0.5);
    gs.resources.food+=Math.floor((cost.food||0)*0.5);
    gs.resources.wood+=Math.floor((cost.wood||0)*0.5);
    gs.resources.stone+=Math.floor((cost.stone||0)*0.5);
    addParticle(b.x*TILE+b.def.w*TILE/2,b.y*TILE,'+50% recursos','#FFD700');
    addMessage('[+] '+b.def.name+' vendido!');
    b.hp=0;
    gs.selectedBuilding=null;gs.showBuildingMenu=false;
}
function startMoveBuilding(b){
    if(!b||b.type==='CASTLE'){addMessage('[x] Não é possível mover o Castelo!');return}
    gs.moveMode=true;gs.movingBuilding=b;
    gs.showBuildingMenu=false;gs.buildMode=null;
    gs.showBuildMenu=false;gs.showRecruitMenu=false;
    addMessage('[~] Clique no novo local para mover '+b.def.name);
}

function startMoveSelectedBuildings(){
    if(gs.selectedBuildings.length===0) return;
    if(!gs.selectedBuildings.every(b=>b.type==='WALL')){
        addMessage('[x] Movimento em grupo disponível apenas para muros.');
        return;
    }
    let minX=Math.min(...gs.selectedBuildings.map(b=>b.x));
    let minY=Math.min(...gs.selectedBuildings.map(b=>b.y));
    gs.moveSelectionMode=true;
    gs.movingBuildings=gs.selectedBuildings.map(b=>({building:b,ox:b.x-minX,oy:b.y-minY}));
    gs.showBuildMenu=false;gs.showRecruitMenu=false;gs.showBuildingMenu=false;
    addMessage('[~] Movimento em grupo: clique para reposicionar os muros selecionados.');
}

function canPlaceMovingGroup(anchorTile){
    for(let mb of gs.movingBuildings){
        let b=mb.building;
        let tx=anchorTile.x+mb.ox,ty=anchorTile.y+mb.oy;
        if(!canBuild(tx,ty,b.def,b)) return false;
    }
    return true;
}

function placeMovingGroup(anchorTile){
    for(let mb of gs.movingBuildings){
        mb.building.x=anchorTile.x+mb.ox;
        mb.building.y=anchorTile.y+mb.oy;
    }
    gs.moveSelectionMode=false;
    gs.movingBuildings=[];
    addMessage('[+] Linha de muralha reposicionada.');
}

// ONDAS DE INIMIGOS
// ═══════════════════════════════════════════════════════════
function spawnWave(){
    gs.waveNumber++;
    let count=3+gs.waveNumber*2;
    let types=['soldier','bandit','creature'];
    // At night, some wave enemies are vampires
    if(gs.isNight&&gs.waveNumber>=2) types.push('vamp_warrior','giant_bat');
    if(gs.isNight&&gs.waveNumber>=4) types.push('vamp_lord');

    let side=randInt(0,3);
    for(let i=0;i<count;i++){
        let x,y,off=rand(-200,200);
        switch(side){
            case 0:x=rand(TILE*5,(MAP_W-5)*TILE);y=TILE*3;break;
            case 1:x=rand(TILE*5,(MAP_W-5)*TILE);y=(MAP_H-3)*TILE;break;
            case 2:x=TILE*3;y=rand(TILE*5,(MAP_H-5)*TILE);break;
            case 3:x=(MAP_W-3)*TILE;y=rand(TILE*5,(MAP_H-5)*TILE);break;
        }
        x=clamp(x+off*0.3,TILE*2,(MAP_W-2)*TILE);
        y=clamp(y+off*0.3,TILE*2,(MAP_H-2)*TILE);
        let type=types[randInt(0,Math.min(gs.waveNumber-1,types.length-1))];
        gs.enemies.push(new EnemyUnit(x,y,type));
    }
    let vampMsg=gs.isNight?' (com vampiros!)':'';
    addMessage('[!] Onda '+gs.waveNumber+': '+count+' inimigos se aproximam!'+vampMsg);
    gs.screenShake=0.5;
}

// ═══════════════════════════════════════════════════════════
// SISTEMA DE CAÇA - ANIMAIS
// ═══════════════════════════════════════════════════════════
function spawnAnimal(type,cx,cy){
    // Find a suitable forest/grass tile away from city center
    let attempts=0,x,y;
    let mapCX=Math.floor(MAP_W/2),mapCY=Math.floor(MAP_H/2);
    do {
        let tx=cx||randInt(5,MAP_W-5),ty=cy||randInt(5,MAP_H-5);
        let ter=gs.map[ty][tx];
        // Prefer forest/grass/field far from city center
        let distFromCenter=dist(tx,ty,mapCX,mapCY);
        if((ter===T.FOREST||ter===T.GRASS||ter===T.FIELD)&&distFromCenter>12){
            x=tx*TILE+rand(-8,8);y=ty*TILE+rand(-8,8);break;
        }
        attempts++;
    } while(attempts<100);
    if(x!==undefined) gs.animals.push(new Animal(x,y,type||ANIMAL_TYPES[randInt(0,ANIMAL_TYPES.length-1)]));
}

function initAnimals(){
    // Spawn initial animals distributed around the map
    let counts={cervo:6,javali:4,coelho:8,lobo:3};
    for(let type in counts){
        for(let i=0;i<counts[type];i++) spawnAnimal(type);
    }
}

function updateAnimals(dt){
    // Update all animals
    for(let i=gs.animals.length-1;i>=0;i--){
        let a=gs.animals[i];
        a.update(dt);
        // Handle dead animals: show death anim briefly, then queue respawn
        if(!a.alive){
            a.deathTimer-=dt;
            if(a.deathTimer<=0){
                // Queue respawn after 2-4 minutes
                gs.animalRespawnQueue.push({type:a.type,timer:rand(120,240)});
                gs.animals.splice(i,1);
            }
        }
    }
    // Respawn queued animals
    for(let i=gs.animalRespawnQueue.length-1;i>=0;i--){
        gs.animalRespawnQueue[i].timer-=dt;
        if(gs.animalRespawnQueue[i].timer<=0){
            spawnAnimal(gs.animalRespawnQueue[i].type);
            gs.animalRespawnQueue.splice(i,1);
        }
    }
    // Periodic spawn to keep map populated (max 30 animals)
    gs.animalSpawnTimer+=dt;
    if(gs.animalSpawnTimer>=60&&gs.animals.filter(a=>a.alive).length<30){
        gs.animalSpawnTimer=0;
        spawnAnimal(ANIMAL_TYPES[randInt(0,ANIMAL_TYPES.length-1)]);
    }
}

// ═══════════════════════════════════════════════════════════
// RECURSOS
// ═══════════════════════════════════════════════════════════
function updateResources(dt){
    gs.resourceTimer+=dt;
    if(gs.resourceTimer>=5){
        gs.resourceTimer=0;
        let mult=getProductionMultiplier();
        let wNeeded=getWorkersNeeded();
        let wAvail=getAvailablePop();
        let wRatio=wNeeded>0?Math.min(1,Math.max(0,wAvail/wNeeded)):1;
        for(let b of gs.buildings){
            if(b.hp<=0||!b.def.produces)continue;

            // Serraria coleta madeira de arvores ao redor (arvores quebram ao esgotar)
            if(b.type==='LUMBER'){
                let bx=b.x+Math.floor(b.def.w/2),by=b.y+Math.floor(b.def.h/2);
                let tNode=findNearestNode(gs.treeNodes,bx,by,7);
                if(tNode){
                    let gather=Math.max(1,Math.floor((1.2+b.def.produces.wood)*mult*wRatio));
                    gs.resources.wood+=gather;
                    tNode.hp-=1.5*wRatio;
                    addParticle((b.x+0.5)*TILE,b.y*TILE,'+'+gather+' wood','#C9A66B');
                    if(tNode.hp<=0){
                        delete gs.treeNodes[nodeKey(tNode.x,tNode.y)];
                        gs.map[tNode.y][tNode.x]=T.GRASS;
                addParticle((tNode.x+0.5)*TILE,(tNode.y+0.3)*TILE,'Arvore caiu','#8BC34A');
                    }
                }
                continue;
            }

            // Pedreira minera pedra de rochas
            if(b.type==='QUARRY'){
                let bx=b.x+Math.floor(b.def.w/2),by=b.y+Math.floor(b.def.h/2);
                let sNode=findNearestNode(gs.stoneNodes,bx,by,8);
                if(sNode){
                    let gather=Math.max(1,Math.floor((1+b.def.produces.stone)*mult*wRatio));
                    gs.resources.stone+=gather;
                    sNode.hp-=1.2*wRatio;
                    addParticle((b.x+0.5)*TILE,b.y*TILE,'+'+gather+' stone','#B0BEC5');
                    if(sNode.hp<=0){
                        delete gs.stoneNodes[nodeKey(sNode.x,sNode.y)];
                        addParticle((sNode.x+0.5)*TILE,(sNode.y+0.3)*TILE,'Esgotada','#90A4AE');
                    }
                }
                continue;
            }

            for(let res in b.def.produces){
                let amount=Math.floor(b.def.produces[res]*mult*wRatio);
                if(amount>0){
                    gs.resources[res]+=amount;
                    let bx=b.x*TILE+(b.def.w*TILE)/2,by=b.y*TILE;
                    let col=res==='gold'?'#FFD700':res==='food'?'#2ecc71':res==='stone'?'#B0BEC5':'#DEB887';
                    addParticle(bx,by,'+'+amount+' '+res,col);
                }
            }
        }
    }
}
