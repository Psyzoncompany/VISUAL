window.addEventListener('keydown',(e)=>{
    keys[e.code]=true;

    if(gs.phase==='menu'){gs.phase='playing';return}
    if(gs.phase!=='playing')return;

    if(e.code==='KeyO'){
        gs.showGuide=!gs.showGuide;gs.showDiplomacy=false;
        if(gs.showGuide) gs.guideQuery='';
        return;
    }
    if(e.code==='KeyN'){
        gs.showDiplomacy=!gs.showDiplomacy;gs.showGuide=false;
        return;
    }

    if(gs.showGuide||gs.showDiplomacy){
        if(e.code==='Escape'){gs.showGuide=false;gs.showDiplomacy=false;return}
        if(gs.showGuide){
            if(e.code==='Backspace'){e.preventDefault();gs.guideQuery=gs.guideQuery.slice(0,-1);return}
            if(e.code==='Space'){gs.guideQuery+=' ';return}
            if(e.key.length===1&&!e.ctrlKey&&!e.metaKey&&!e.altKey){
                gs.guideQuery+=e.key;
            }
        }
        return;
    }

    // Save / Load
    if(e.code==='F5'){e.preventDefault();saveGame();return}
    if(e.code==='F9'){e.preventDefault();loadGame();return}

    if(e.code==='KeyB'){gs.showBuildMenu=!gs.showBuildMenu;gs.showRecruitMenu=false;gs.showBuildingMenu=false;gs.selectedBuilding=null;if(!gs.showBuildMenu)gs.buildMode=null}
    if(e.code==='KeyR'){gs.showRecruitMenu=!gs.showRecruitMenu;gs.showBuildMenu=false;gs.showBuildingMenu=false;gs.selectedBuilding=null;gs.buildMode=null}
    if(e.code==='Escape'){
        gs.buildMode=null;gs.showBuildMenu=false;gs.showRecruitMenu=false;gs.showDiplomacy=false;
        gs.selectedUnits.forEach(u=>u.selected=false);gs.selectedUnits=[];
        gs.selectedBuilding=null;gs.selectedBuildings=[];gs.showBuildingMenu=false;
        gs.moveMode=false;gs.movingBuilding=null;gs.moveSelectionMode=false;gs.movingBuildings=[];
        gs.selectedArmies=[];gs.dragBuilding=null;gs.isDragging=false;
    }
    if(e.code==='KeyP') gs.paused=!gs.paused;
    if(e.code==='KeyU'){upgradeForge();return}
    if(e.code==='KeyJ'){upgradeMasonry();return}
    if(e.code==='KeyF'&&gs.phase==='gameover'){location.reload()}
    if(e.code==='KeyG'&&gs.selectedUnits.length>0){
        let t=worldToTerr(mouse.wx,mouse.wy);
        unitsToArmy([...gs.selectedUnits],{x:t.x,y:t.y});
    }

    // Building actions
    if(gs.showBuildingMenu&&gs.selectedBuilding){
        if(e.code==='KeyM') startMoveBuilding(gs.selectedBuilding);
        if(e.code==='KeyV') sellBuilding(gs.selectedBuilding);
    }
    if(e.code==='KeyM'&&gs.selectedBuildings.length>1) startMoveSelectedBuildings();

    if(gs.showBuildMenu){
        let n=parseInt(e.key);
        if(n>=1&&n<=BUILD_LIST.length) gs.buildMode=BUILD_LIST[n-1];
    }
    if(gs.showRecruitMenu){
        let n=parseInt(e.key);
        if(n>=1&&n<=UNIT_LIST.length) recruitUnit(UNIT_LIST[n-1]);
    }
});
window.addEventListener('keyup',(e)=>{keys[e.code]=false});

canvas.addEventListener('mousemove',(e)=>{
    mouse.x=e.clientX;mouse.y=e.clientY;
    updateMouseWorld();
    if(selBox){selBox.x2=mouse.wx;selBox.y2=mouse.wy}
    if(gs.dragBuilding&&!gs.isDragging&&mouse.left){
        let dd=Math.abs(mouse.x-gs.dragStartMX)+Math.abs(mouse.y-gs.dragStartMY);
        if(dd>8)gs.isDragging=true;
    }
    if(gs.panning&&mouse.middle){
        gs.cameraOffset.x-=(mouse.x-gs.panLastX)/gs.zoom;
        gs.cameraOffset.y-=(mouse.y-gs.panLastY)/gs.zoom;
        gs.panLastX=mouse.x;gs.panLastY=mouse.y;
        updateCamera();
        updateMouseWorld();
    }
});

canvas.addEventListener('mousedown',(e)=>{
    e.preventDefault();
    if(gs.phase==='menu'){gs.phase='playing';return}
    if(gs.phase!=='playing'||gs.paused)return;
    if(gs.showGuide)return;
    if(gs.showDiplomacy){
        // Allow UI button clicks in diplomacy panel
        if(e.button===0){mouse.left=true;isClickUI(mouse.x,mouse.y)}
        return;
    }

    if(e.button===1){
        mouse.middle=true;
        gs.panning=true;
        gs.panLastX=mouse.x;gs.panLastY=mouse.y;
        return;
    }

    if(e.button===0){
        mouse.left=true;
        if(isClickUI(mouse.x,mouse.y))return;

        if(gs.moveSelectionMode&&gs.movingBuildings.length>0){
            let tile=w2t(mouse.wx,mouse.wy);
            if(canPlaceMovingGroup(tile)){
                placeMovingGroup(tile);
                addParticle(mouse.wx,mouse.wy,'+','#00FF00');
            }else addMessage('[x] Não há espaço para todos os muros.');
            return;
        }

        // Move mode - reposition building
        if(gs.moveMode&&gs.movingBuilding){
            let tile=w2t(mouse.wx,mouse.wy);let def=gs.movingBuilding.def;
            if(canBuild(tile.x,tile.y,def,gs.movingBuilding)){
                gs.movingBuilding.x=tile.x;gs.movingBuilding.y=tile.y;
                addMessage('[+] '+def.name+' movido!');
                addParticle(mouse.wx,mouse.wy,'+','#00FF00');
                gs.moveMode=false;gs.movingBuilding=null;gs.selectedBuilding=null;
            } else {addMessage('[x] Local inválido!')}
            return;
        }

        if(gs.buildMode){
            let tile=w2t(mouse.wx,mouse.wy);let def=BUILD[gs.buildMode];
            if(canBuild(tile.x,tile.y,def)&&canAfford(def.cost)){
                spend(def.cost);
                gs.buildings.push(new Building(tile.x,tile.y,gs.buildMode));
                addMessage('[+] '+def.name+' construído!');
                addParticle(mouse.wx,mouse.wy,'+','#00FF00');
            } else if(!canAfford(def.cost)){addMessage('[x] Recursos insuficientes!')}
            else{addMessage('[x] Local inválido!')}
        } else {
            // Check for building drag
            let dragB=null;
            for(let b of gs.buildings){
                if(b.hp<=0||b.type==='CASTLE')continue;
                let bx=b.x*TILE,by=b.y*TILE,bw=b.def.w*TILE,bh=b.def.h*TILE;
                if(mouse.wx>=bx&&mouse.wx<bx+bw&&mouse.wy>=by&&mouse.wy<by+bh){dragB=b;break}
            }
            gs.dragBuilding=dragB;gs.isDragging=false;
            gs.dragStartMX=mouse.x;gs.dragStartMY=mouse.y;
            selBox={x1:mouse.wx,y1:mouse.wy,x2:mouse.wx,y2:mouse.wy};
        }
    }
    if(e.button===2){
        mouse.right=true;
        if(gs.selectedBuildings.length>1&&gs.selectedBuildings.every(b=>b.type==='WALL')){
            if(!gs.moveSelectionMode) startMoveSelectedBuildings();
            let tile=w2t(mouse.wx,mouse.wy);
            if(canPlaceMovingGroup(tile)){
                placeMovingGroup(tile);
                addParticle(mouse.wx,mouse.wy,'OK','#FFD700');
            }
        }
        if(gs.selectedArmies.length>0){
            let tt=worldToTerr(mouse.wx,mouse.wy);
            let target={x:tt.x,y:tt.y};
            let to=getTerritoryCenterWorld(target.x,target.y);
            for(let a of gs.selectedArmies){a.tx=to.x;a.ty=to.y;a.targetTerritory=target}
            addParticle(mouse.wx,mouse.wy,'!','#00CCFF');
        }
        if(gs.selectedUnits.length>0){
            let tgtEnemy=null;
            for(let en of gs.enemies){
                if(!en.alive)continue;
                if(dist(mouse.wx,mouse.wy,en.x,en.y)<TILE){tgtEnemy=en;break}
            }
            for(let i=0;i<gs.selectedUnits.length;i++){
                let u=gs.selectedUnits[i];
                if(tgtEnemy){u.targetEnemy=tgtEnemy;u.moveTarget=null}
                else{
                    let angle=(i/gs.selectedUnits.length)*Math.PI*2;
                    let spread=Math.min(gs.selectedUnits.length*8,50);
                    u.moveTarget={x:mouse.wx+Math.cos(angle)*spread,y:mouse.wy+Math.sin(angle)*spread};
                    u.targetEnemy=null;
                }
            }
            addParticle(mouse.wx,mouse.wy,'!','#00FF00');
        }
    }
});

canvas.addEventListener('mouseup',(e)=>{
    if(gs.showGuide)return;
    if(e.button===1){
        mouse.middle=false;
        gs.panning=false;
        return;
    }
    if(e.button===0){
        mouse.left=false;
        // Handle building drag
        if(gs.isDragging&&gs.dragBuilding){
            let tile=w2t(mouse.wx,mouse.wy);let def=gs.dragBuilding.def;
            if(canBuild(tile.x,tile.y,def,gs.dragBuilding)){
                gs.dragBuilding.x=tile.x;gs.dragBuilding.y=tile.y;
                addMessage('[+] '+def.name+' movido!');
                addParticle(mouse.wx,mouse.wy,'+','#00FF00');
            }else{addMessage('[x] Local inválido!')}
            gs.dragBuilding=null;gs.isDragging=false;selBox=null;return;
        }
        gs.dragBuilding=null;gs.isDragging=false;
        if(selBox&&!gs.buildMode){
            gs.selectedUnits.forEach(u=>u.selected=false);gs.selectedUnits=[];
            gs.selectedArmies=[];
            gs.selectedBuildings=[];
            let x1=Math.min(selBox.x1,selBox.x2),y1=Math.min(selBox.y1,selBox.y2);
            let x2=Math.max(selBox.x1,selBox.x2),y2=Math.max(selBox.y1,selBox.y2);

            if((x2-x1)*(y2-y1)<200){
                // Click simples
                let md=TILE*1.5,near=null;
                for(let u of gs.units){if(!u.alive)continue;let d=dist(mouse.wx,mouse.wy,u.x,u.y);if(d<md){md=d;near=u}}
                if(near){
                    near.selected=true;gs.selectedUnits=[near];
                    gs.selectedBuilding=null;gs.selectedBuildings=[];gs.showBuildingMenu=false;gs.selectedArmies=[];
                }
                if(!near){
                    let nearArmy=gs.armies.find(a=>a.owner===OWNER.PLAYER&&dist(a.x,a.y,mouse.wx,mouse.wy)<18);
                    if(nearArmy){gs.selectedArmies=[nearArmy]}
                }
                // Verificar click em construção
                if(!near){
                    let clickedBuilding=null;
                    for(let b of gs.buildings){
                        if(b.hp<=0)continue;
                        let bx=b.x*TILE,by=b.y*TILE,bw=b.def.w*TILE,bh=b.def.h*TILE;
                        if(mouse.wx>=bx&&mouse.wx<bx+bw&&mouse.wy>=by&&mouse.wy<by+bh){clickedBuilding=b;break}
                    }
                    if(clickedBuilding){
                        gs.selectedBuilding=clickedBuilding;gs.showBuildingMenu=true;
                        gs.selectedBuildings=[clickedBuilding];
                        gs.selectedArmies=[];
                        gs.showBuildMenu=false;gs.showRecruitMenu=false;
                        if(clickedBuilding.type==='BARRACKS') gs.showRecruitMenu=true;
                    } else {
                        gs.selectedBuilding=null;gs.selectedBuildings=[];gs.showBuildingMenu=false;
                    }
                }
            } else {
                // Seleção por caixa
                for(let u of gs.units){
                    if(!u.alive)continue;
                    if(u.x>=x1&&u.x<=x2&&u.y>=y1&&u.y<=y2){u.selected=true;gs.selectedUnits.push(u)}
                }
                for(let a of gs.armies){
                    if(a.owner!==OWNER.PLAYER) continue;
                    if(a.x>=x1&&a.x<=x2&&a.y>=y1&&a.y<=y2) gs.selectedArmies.push(a);
                }
                for(let b of gs.buildings){
                    if(b.hp<=0) continue;
                    let bx=b.x*TILE,by=b.y*TILE,bw=b.def.w*TILE,bh=b.def.h*TILE;
                    if(bx>=x1&&by>=y1&&bx+bw<=x2&&by+bh<=y2) gs.selectedBuildings.push(b);
                }
                if(gs.selectedBuildings.length===1){gs.selectedBuilding=gs.selectedBuildings[0];gs.showBuildingMenu=true}
            }
            selBox=null;
        }
    }
    if(e.button===2) mouse.right=false;
});

canvas.addEventListener('contextmenu',(e)=>e.preventDefault());
canvas.addEventListener('wheel',(e)=>{
    e.preventDefault();
    if(gs.phase!=='playing'||gs.showGuide||gs.showDiplomacy)return;
    let oldZoom=gs.zoom;
    gs.zoom=clamp(gs.zoom+(e.deltaY<0?0.1:-0.1),0.7,2.2);
    if(gs.zoom===oldZoom)return;
    let oldWX=mouse.wx,oldWY=mouse.wy;
    updateCamera();
    gs.cameraOffset.x+=oldWX-(mouse.x/gs.zoom+gs.camera.x);
    gs.cameraOffset.y+=oldWY-(mouse.y/gs.zoom+gs.camera.y);
    updateCamera();
    updateMouseWorld();
},{passive:false});

function isClickUI(mx,my){
    for(let b of uiButtons){
        if(mx>=b.x&&mx<=b.x+b.w&&my>=b.y&&my<=b.y+b.h){if(b.fn)b.fn();return true}
    }
    return false;
}

function renderTerrain(){
    let view=getViewSize();
    let cols=Math.ceil(view.w/TILE)+2,rows=Math.ceil(view.h/TILE)+2;
    let stx=Math.floor(gs.camera.x/TILE),sty=Math.floor(gs.camera.y/TILE);
    let ox=-(gs.camera.x%TILE),oy=-(gs.camera.y%TILE);

    for(let row=-1;row<rows;row++){
        for(let col=-1;col<cols;col++){
            let tx=stx+col,ty=sty+row;
            let dx=col*TILE+ox,dy=row*TILE+oy;

            if(tx<0||tx>=MAP_W||ty<0||ty>=MAP_H){
                ctx.fillStyle='#0a0a1a';ctx.fillRect(dx,dy,TILE,TILE);continue;
            }

            let ter=gs.map[ty][tx];
            let cols=TERRAIN_COLORS[ter];
            ctx.fillStyle=cols[hash(tx,ty)%3];
            ctx.fillRect(dx,dy,TILE,TILE);

            let terr=getTerritoryByTile(tx,ty);
            if(terr){
                ctx.fillStyle=OWNER_COLOR[terr.owner]||OWNER_COLOR[OWNER.NEUTRAL];
                ctx.fillRect(dx,dy,TILE,TILE);
            }

            // Detalhes de terreno
            if(ter===T.FOREST){
                let treeNode=gs.treeNodes[nodeKey(tx,ty)];
                if(treeNode){
                    let treeImg=SC.pngTrees[treeNode.variant%SC.pngTrees.length];
                    if(treeImg&&treeImg.complete&&treeImg.naturalWidth){
                        let tw=treeImg.naturalWidth,ts=tw>100?TILE*2:TILE+10;
                        ctx.drawImage(treeImg,dx+TILE/2-ts/2,dy+TILE-ts,ts,ts);
                    }else{
                        let tf=hash(tx,ty)%3;
                        ctx.drawImage(SC.tree[tf],dx,dy);
                    }
                }
            }
            if(ter===T.MOUNTAIN){
                ctx.drawImage(SC.rock,dx,dy);
            }
            if(ter===T.GRASS){
                let det=hash(tx*3,ty*5)%12;
                if(det<2){ctx.fillStyle='#5aaa4f';ctx.fillRect(dx+(hash(tx,ty)%20),dy+(hash(ty,tx)%20),3,5)}
                if(det===3){ctx.fillStyle='#e8d44d';ctx.fillRect(dx+10,dy+12,3,3)}
                if(det===4){ctx.fillStyle='#C66';ctx.fillRect(dx+16,dy+8,3,3)} // flor
            }
            if(ter===T.WATER){
                let w=Math.sin(gs.gameTime*2+tx*0.5+ty*0.3)*3;
                ctx.fillStyle='rgba(255,255,255,0.12)';
                ctx.fillRect(dx+6+w,dy+12,10,2);
                ctx.fillRect(dx+14-w,dy+20,8,2);
            }
            if(ter===T.ROAD){
                ctx.fillStyle='#6B5345';
                ctx.fillRect(dx+4,dy+14,6,3);ctx.fillRect(dx+18,dy+6,5,3);
            }
            if(ter===T.FIELD){
                let det=hash(tx*2,ty*3)%4;
                if(det<2){ctx.fillStyle='#90A030';ctx.fillRect(dx+det*8,dy+det*6,4,6)}
            }

            let sNode=gs.stoneNodes[nodeKey(tx,ty)];
            if(sNode){
                let img=SC.rockNodes[sNode.variant%SC.rockNodes.length];
                if(img&&img.complete&&img.naturalWidth){
                    let size=sNode.size===2?TILE*2:TILE;
                    ctx.drawImage(img,dx+TILE/2-size/2,dy+TILE-size,size,size);
                }
            }

            let ruin=gs.ruins.find(r=>r.x===tx&&r.y===ty);
            if(ruin){
                let img=SC.ruins[ruin.variant];
                if(img&&img.complete&&img.naturalWidth){
                    let size=ruin.size===2?TILE*2:TILE;
                    ctx.drawImage(img,dx+TILE/2-size/2,dy+TILE-size,size,size);
                }
            }
        }
    }

    // Grid sutil no modo construção/mover
    if(gs.buildMode||gs.moveMode||gs.isDragging){
        ctx.strokeStyle='rgba(255,255,255,0.08)';ctx.lineWidth=1;
        for(let row=-1;row<rows;row++){
            for(let col=-1;col<cols;col++){
                ctx.strokeRect(col*TILE+ox,row*TILE+oy,TILE,TILE);
            }
        }
    }
}

function renderBuildings(){
    // Ordenar por Y para depth sort
    let sorted=[...gs.buildings].filter(b=>b.hp>0).sort((a,b)=>a.y-b.y);
    for(let b of sorted) b.draw();
}

function renderEntities(){
    // Combinar todas entidades para depth sort
    let all=[];
    for(let u of gs.units)if(u.alive)all.push(u);
    for(let e of gs.enemies)if(e.alive)all.push(e);
    if(gs.king&&gs.king.alive) all.push(gs.king);
    // Include animals (living and briefly-dead for death anim)
    for(let a of gs.animals)if(a.alive||a.deathTimer>0)all.push(a);
    all.sort((a,b)=>a.y-b.y);
    for(let e of all) e.draw();

    for(let a of gs.armies){
        let sx=a.x-gs.camera.x,sy=a.y-gs.camera.y;
        let col=a.owner===OWNER.PLAYER?'#4FC3F7':a.owner===OWNER.ENEMY_A?'#F06262':a.owner===OWNER.VAMPIRES?'#CC0000':'#BA68C8';
        ctx.fillStyle=col;
        ctx.beginPath();ctx.arc(sx,sy,7,0,Math.PI*2);ctx.fill();
        ctx.fillStyle='#111';ctx.beginPath();ctx.arc(sx,sy,3,0,Math.PI*2);ctx.fill();
        ctx.fillStyle='#FFF';ctx.font='9px monospace';ctx.textAlign='center';
        ctx.fillText(String(armyCount(a.comp)),sx,sy-10);
        if(gs.selectedArmies.includes(a)){
            ctx.strokeStyle='#0CF';ctx.lineWidth=2;
            ctx.beginPath();ctx.arc(sx,sy,11,0,Math.PI*2);ctx.stroke();
        }
        ctx.textAlign='left';
    }
}

function renderEffects(){
    // Projéteis
    for(let p of gs.projectiles){
        let t=1-(p.timer/0.3);
        let cx=lerp(p.x-gs.camera.x,p.tx-gs.camera.x,t);
        let cy=lerp(p.y-gs.camera.y,p.ty-gs.camera.y,t);
        ctx.fillStyle=p.color;
        ctx.beginPath();ctx.arc(cx,cy,3,0,Math.PI*2);ctx.fill();
        // Trail
        ctx.fillStyle=p.color+'60';
        ctx.beginPath();ctx.arc(cx-2,cy-1,2,0,Math.PI*2);ctx.fill();
    }
    // Explosões
    for(let e of gs.explosions){
        let sx=e.x-gs.camera.x,sy=e.y-gs.camera.y;
        let alpha=e.life/0.3;
        ctx.strokeStyle=`rgba(255,200,50,${alpha})`;ctx.lineWidth=2;
        ctx.beginPath();ctx.arc(sx,sy,e.radius,0,Math.PI*2);ctx.stroke();
        ctx.fillStyle=`rgba(255,150,30,${alpha*0.3})`;
        ctx.beginPath();ctx.arc(sx,sy,e.radius*0.6,0,Math.PI*2);ctx.fill();
    }
    // Partículas de texto
    for(let p of gs.particles){
        let sx=p.x-gs.camera.x,sy=p.y-gs.camera.y;
        ctx.globalAlpha=Math.max(0,p.life/p.maxLife);
        ctx.fillStyle=p.color;ctx.font='bold 13px monospace';ctx.textAlign='center';
        ctx.fillText(p.text,sx,sy);ctx.globalAlpha=1;ctx.textAlign='left';
    }
    // Caixa de seleção
    if(selBox){
        let x1=selBox.x1-gs.camera.x,y1=selBox.y1-gs.camera.y;
        let x2=selBox.x2-gs.camera.x,y2=selBox.y2-gs.camera.y;
        ctx.strokeStyle='#0F0';ctx.lineWidth=1;ctx.setLineDash([4,4]);
        ctx.strokeRect(x1,y1,x2-x1,y2-y1);ctx.setLineDash([]);
        ctx.fillStyle='rgba(0,255,0,0.08)';ctx.fillRect(x1,y1,x2-x1,y2-y1);
    }
}

function renderBuildPreview(){
    // Drag building preview
    if(gs.isDragging&&gs.dragBuilding){
        let tile=w2t(mouse.wx,mouse.wy);let def=gs.dragBuilding.def;
        let sx=tile.x*TILE-gs.camera.x,sy=tile.y*TILE-gs.camera.y;
        let ok=canBuild(tile.x,tile.y,def,gs.dragBuilding);
        ctx.fillStyle=ok?'rgba(0,200,255,0.25)':'rgba(255,0,0,0.25)';
        ctx.fillRect(sx,sy,def.w*TILE,def.h*TILE);
        ctx.strokeStyle=ok?'#0CF':'#F00';ctx.lineWidth=2;ctx.strokeRect(sx,sy,def.w*TILE,def.h*TILE);
        let spr=SC[gs.dragBuilding.type.toLowerCase()];
        if(spr){ctx.globalAlpha=0.6;ctx.drawImage(spr,sx,sy);ctx.globalAlpha=1}
        return;
    }
    if(gs.moveSelectionMode&&gs.movingBuildings.length>0){
        let tile=w2t(mouse.wx,mouse.wy);
        let ok=canPlaceMovingGroup(tile);
        for(let mb of gs.movingBuildings){
            let b=mb.building;
            let tx=tile.x+mb.ox,ty=tile.y+mb.oy;
            let sx=tx*TILE-gs.camera.x,sy=ty*TILE-gs.camera.y;
            let spr=SC[b.type.toLowerCase()];
            ctx.fillStyle=ok?'rgba(0,200,255,0.2)':'rgba(255,0,0,0.2)';
            ctx.fillRect(sx,sy,b.def.w*TILE,b.def.h*TILE);
            ctx.strokeStyle=ok?'#0CF':'#F00';ctx.lineWidth=2;
            ctx.strokeRect(sx,sy,b.def.w*TILE,b.def.h*TILE);
            if(spr){ctx.globalAlpha=0.6;ctx.drawImage(spr,sx,sy);ctx.globalAlpha=1}
        }
        return;
    }
    // Move mode preview
    if(gs.moveMode&&gs.movingBuilding){
        let tile=w2t(mouse.wx,mouse.wy);let def=gs.movingBuilding.def;
        let sx=tile.x*TILE-gs.camera.x,sy=tile.y*TILE-gs.camera.y;
        let mw=def.w*TILE,mh=def.h*TILE;
        let ok=canBuild(tile.x,tile.y,def,gs.movingBuilding);
        ctx.fillStyle=ok?'rgba(0,200,255,0.25)':'rgba(255,0,0,0.25)';
        ctx.fillRect(sx,sy,mw,mh);
        ctx.strokeStyle=ok?'#0CF':'#F00';ctx.lineWidth=2;ctx.strokeRect(sx,sy,mw,mh);
        let spr=SC[gs.movingBuilding.type.toLowerCase()];
        if(spr){ctx.globalAlpha=0.6;ctx.drawImage(spr,sx,sy);ctx.globalAlpha=1}
        return;
    }
    if(!gs.buildMode)return;
    let tile=w2t(mouse.wx,mouse.wy);let def=BUILD[gs.buildMode];
    let sx=tile.x*TILE-gs.camera.x,sy=tile.y*TILE-gs.camera.y;
    let w=def.w*TILE,h=def.h*TILE;
    let ok=canBuild(tile.x,tile.y,def)&&canAfford(def.cost);
    ctx.fillStyle=ok?'rgba(0,255,0,0.25)':'rgba(255,0,0,0.25)';
    ctx.fillRect(sx,sy,w,h);
    ctx.strokeStyle=ok?'#0F0':'#F00';ctx.lineWidth=2;ctx.strokeRect(sx,sy,w,h);
    let spr=SC[gs.buildMode.toLowerCase()];
    if(spr){ctx.globalAlpha=0.6;ctx.drawImage(spr,sx,sy);ctx.globalAlpha=1}
    // Range para torre
    if(gs.buildMode==='TOWER'){
        ctx.strokeStyle='rgba(255,165,0,0.3)';ctx.lineWidth=1;
        ctx.beginPath();ctx.arc(sx+TILE/2,sy+TILE/2,BUILD.TOWER.range*TILE,0,Math.PI*2);ctx.stroke();
    }
}

function renderUI(){
    uiButtons=[];

    // ─── Barra de Recursos (Topo) ───
    let barH=52;
    // Gradiente sutil no topo
    let barGrad=ctx.createLinearGradient(0,0,0,barH);
    barGrad.addColorStop(0,'rgba(15,15,40,0.95)');
    barGrad.addColorStop(1,'rgba(8,8,25,0.88)');
    ctx.fillStyle=barGrad;ctx.fillRect(0,0,W,barH);
    ctx.strokeStyle='rgba(80,80,120,0.4)';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(0,barH);ctx.lineTo(W,barH);ctx.stroke();

    let rates=getProductionRates();
    ctx.font='bold 13px monospace';ctx.textAlign='left';
    let rx=14;
    // População
    ctx.fillStyle=gs.population>=gs.popCap?'#F66':'#8CF';
    drawIC('pop',rx,3,16);ctx.fillText(gs.population+'/'+gs.popCap,rx+20,18);
    ctx.font='10px monospace';ctx.fillStyle='#666';
    ctx.fillText('Livres: '+Math.max(0,getAvailablePop()),rx+20,34);
    rx+=120;
    // Comida
    ctx.font='bold 13px monospace';
    ctx.fillStyle=gs.hunger>=2?'#F44':gs.hunger>=1?'#FA4':'#2ecc71';
    drawIC('food',rx,3,16);ctx.fillText(Math.floor(gs.resources.food)+'',rx+20,18);
    ctx.font='10px monospace';ctx.fillStyle=rates.food>=0?'#7B7':'#F88';
    ctx.fillText((rates.food>=0?'+':'')+rates.food+'/min',rx+20,34);
    rx+=105;
    // Madeira
    ctx.font='bold 13px monospace';ctx.fillStyle='#DEB887';
    drawIC('wood',rx,3,16);ctx.fillText(Math.floor(gs.resources.wood)+'',rx+20,18);
    ctx.font='10px monospace';ctx.fillStyle='#997';
    ctx.fillText('+'+rates.wood+'/min',rx+20,34);
    rx+=100;
    // Pedra
    ctx.font='bold 13px monospace';ctx.fillStyle='#B0BEC5';
    drawIC('stone',rx,3,16);ctx.fillText(Math.floor(gs.resources.stone)+'',rx+20,18);
    ctx.font='10px monospace';ctx.fillStyle='#8898A0';
    ctx.fillText('+'+(rates.stone||0)+'/min',rx+20,34);
    rx+=100;
    // Ouro
    ctx.font='bold 13px monospace';ctx.fillStyle='#FFD700';
    drawIC('gold',rx,3,16);ctx.fillText(Math.floor(gs.resources.gold)+'',rx+20,18);
    ctx.font='10px monospace';ctx.fillStyle='#BB8';
    ctx.fillText('+'+rates.gold+'/min',rx+20,34);
    rx+=100;
    // Tropas
    ctx.font='bold 13px monospace';ctx.fillStyle='#87CEEB';
    drawIC('swords',rx,3,16);ctx.fillText(gs.units.filter(u=>u.alive).length+' tropas',rx+20,18);
    rx+=110;
    // Territórios
    let pTerr=getOwnerTerritories(OWNER.PLAYER).length;
    let aTerr=getOwnerTerritories(OWNER.ENEMY_A).length;
    let bTerr=getOwnerTerritories(OWNER.ENEMY_B).length;
    let vTerr=getOwnerTerritories(OWNER.VAMPIRES).length;
    ctx.fillStyle='#9FD9FF';
    drawIC('map',rx,3,16);ctx.fillText(pTerr+'P/'+aTerr+'B/'+bTerr+'M/'+vTerr+'V',rx+20,18);
    ctx.font='10px monospace';ctx.fillStyle='#777';
    let next=Math.max(0,Math.ceil(65-gs.waveTimer));
    ctx.fillText('Onda '+gs.waveNumber+' ('+next+'s)',rx+20,34);
    rx+=165;
    // Dia/Noite
    ctx.font='bold 13px monospace';
    ctx.fillStyle=gs.isNight?'#8888CC':'#FFDD44';
    drawIC(gs.isNight?'moon':'sun',rx,3,16);ctx.fillText(gs.isNight?'Noite':'Dia',rx+20,18);
    ctx.font='10px monospace';ctx.fillStyle='#777';
    ctx.fillText('[N] Diplomacia',rx+20,34);
    rx+=115;
    ctx.font='bold 13px monospace';ctx.fillStyle='#BBB';
    drawIC('zoom',rx,3,16);ctx.fillText('x'+gs.zoom.toFixed(1),rx+20,18);
    ctx.font='10px monospace';ctx.fillStyle='#777';
    ctx.fillText('[O] Livro',rx+20,34);
    rx+=85;
    // Alerta de fome
    if(gs.hunger>=1){
        ctx.font='bold 14px monospace';
        ctx.fillStyle=gs.hunger>=3?'#F00':gs.hunger>=2?'#F60':'#FA0';
        let blink=Math.sin(gs.gameTime*4)>0;
        if(gs.hunger>=2||blink){
            let hMsg=gs.hunger>=3?'FOME EXTREMA!':gs.hunger>=2?'FOME SEVERA!':'Comida baixa!';
            drawIC(gs.hunger>=3?'skull':'warn',rx,6,18);ctx.fillText(hMsg,rx+22,24);
        }
    }

    // ─── Barra de Ações (Base) ───
    let btmH=50;let btmY=H-btmH;
    let btmGrad=ctx.createLinearGradient(0,btmY,0,H);
    btmGrad.addColorStop(0,'rgba(8,8,25,0.88)');
    btmGrad.addColorStop(1,'rgba(15,15,40,0.95)');
    ctx.fillStyle=btmGrad;ctx.fillRect(0,btmY,W,btmH);
    ctx.strokeStyle='rgba(80,80,120,0.4)';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(0,btmY);ctx.lineTo(W,btmY);ctx.stroke();

    ctx.font='11px monospace';ctx.fillStyle='#666';
    ctx.fillText(' [B] Construir  [R] Recrutar  [U] Forjar  [J] Muros  [N] Diplomacia  [O] Livro  Scroll Zoom',15,btmY+18);

    if(gs.isDragging&&gs.dragBuilding){
        ctx.fillStyle='#0CF';ctx.font='13px monospace';
        drawIC('move',4,btmY+26,14);ctx.fillText('Arrastando '+gs.dragBuilding.def.name+'... Solte para posicionar.',22,btmY+40);
    } else if(gs.moveSelectionMode&&gs.movingBuildings.length>0){
        ctx.fillStyle='#0CF';ctx.font='13px monospace';
        drawIC('wall',4,btmY+26,14);ctx.fillText('Reposicionando '+gs.movingBuildings.length+' muro(s) em grupo. Clique para confirmar.',22,btmY+40);
    } else if(gs.moveMode&&gs.movingBuilding){
        ctx.fillStyle='#0CF';ctx.font='13px monospace';
        drawIC('move',4,btmY+26,14);ctx.fillText('Movendo: '+gs.movingBuilding.def.name+'   (Clique para posicionar, ESC cancela)',22,btmY+40);
    } else if(gs.buildMode){
        let def=BUILD[gs.buildMode];
        ctx.fillStyle='#FFD700';ctx.font='13px monospace';
        drawIC('build',4,btmY+26,14);
        let costStr='Construindo: '+def.name+'   Custo: G:'+def.cost.gold+' F:'+def.cost.food+' W:'+def.cost.wood+' S:'+(def.cost.stone||0)+'   (Clique para posicionar, ESC cancela)';
        ctx.fillText(costStr,22,btmY+40);
    } else if(gs.showBuildingMenu&&gs.selectedBuilding){
        let sb=gs.selectedBuilding;
        ctx.fillStyle='#FFD700';ctx.font='13px monospace';
        drawIC('castle',4,btmY+26,14);ctx.fillText(sb.def.name+' | HP: '+sb.hp+'/'+sb.maxHp+(sb.type!=='CASTLE'?'   [M] Mover   [V] Vender':'')+'   [ESC] Fechar',22,btmY+40);
    } else if(gs.selectedArmies.length>0){
        let total=gs.selectedArmies.reduce((acc,a)=>acc+armyCount(a.comp),0);
        ctx.fillStyle='#65D6FF';ctx.font='13px monospace';
        drawIC('flag',4,btmY+26,14);ctx.fillText(gs.selectedArmies.length+' exercito(s) | tropas: '+total+' | Clique direito para comandar conquista/defesa',22,btmY+40);
    } else if(gs.selectedUnits.length>0){
        let info=gs.selectedUnits.length+' unidade(s) | ';
        let types={};gs.selectedUnits.forEach(u=>{types[u.name]=(types[u.name]||0)+1});
        for(let t in types)info+=types[t]+'x '+t+' ';
        ctx.fillStyle='#0F0';ctx.font='13px monospace';
        drawIC('star',4,btmY+26,14);ctx.fillText(info+' | Clique direito: mover/atacar | [G] mobiliza para exercito',22,btmY+40);
    } else if(gs.selectedBuildings.length>1){
        ctx.fillStyle='#FFD700';ctx.font='13px monospace';
        drawIC('wall',4,btmY+26,14);ctx.fillText(gs.selectedBuildings.length+' construcoes selecionadas | [M] mover grupo de muros',22,btmY+40);
    } else {
        ctx.fillStyle='#9BB';ctx.font='12px monospace';
        drawIC('gear',4,btmY+26,14);ctx.fillText('Forja:'+gs.upgrades.forge+'/5  |  Alvenaria:'+gs.upgrades.masonry+'/5',22,btmY+40);
    }

    // ─── Menu Construção ───
    if(gs.showBuildMenu){
        let mw=280,mh=BUILD_LIST.length*48+45,mx=15,my=btmY-mh-10;
        ctx.fillStyle='rgba(12,12,30,0.96)';ctx.fillRect(mx,my,mw,mh);
        ctx.strokeStyle='rgba(255,215,0,0.5)';ctx.lineWidth=2;ctx.strokeRect(mx,my,mw,mh);
        // Header
        ctx.fillStyle='rgba(255,215,0,0.08)';ctx.fillRect(mx+1,my+1,mw-2,30);
        drawIC('build',mx+10,my+6,18);
        ctx.fillStyle='#FFD700';ctx.font='bold 14px monospace';ctx.fillText('CONSTRUCOES',mx+34,my+22);

        for(let i=0;i<BUILD_LIST.length;i++){
            let type=BUILD_LIST[i],def=BUILD[type];
            let by=my+35+i*48,ok=canAfford(def.cost);
            ctx.fillStyle=type===gs.buildMode?'rgba(255,215,0,0.15)':'rgba(35,35,60,0.8)';
            ctx.fillRect(mx+5,by,mw-10,42);
            ctx.strokeStyle=ok?'rgba(100,100,140,0.5)':'rgba(100,50,50,0.5)';ctx.lineWidth=1;ctx.strokeRect(mx+5,by,mw-10,42);
            // Icon
            drawIC(def.icon,mx+10,by+4,16);
            ctx.fillStyle=ok?'#EEE':'#666';ctx.font='13px monospace';
            ctx.fillText('['+(i+1)+'] '+def.name,mx+30,by+18);
            ctx.fillStyle=ok?'#999':'#555';ctx.font='10px monospace';
            let info='G:'+def.cost.gold+' F:'+def.cost.food+' W:'+def.cost.wood+' S:'+(def.cost.stone||0);
            if(def.popCap>0)info+=' | Pop +'+def.popCap;
            if(def.produces)info+=' | '+JSON.stringify(def.produces).replace(/[{}"]/g,'');
            if(def.workers>0)info+=' | '+def.workers+' trab.';
            ctx.fillText(info,mx+30,by+34);
            uiButtons.push({x:mx+5,y:by,w:mw-10,h:42,fn:()=>{gs.buildMode=type}});
        }
    }

    // ─── Menu Recrutamento ───
    if(gs.showRecruitMenu){
        let mw=300,mh=UNIT_LIST.length*48+55,mx=310,my=btmY-mh-10;
        ctx.fillStyle='rgba(12,12,30,0.96)';ctx.fillRect(mx,my,mw,mh);
        ctx.strokeStyle='rgba(200,70,70,0.5)';ctx.lineWidth=2;ctx.strokeRect(mx,my,mw,mh);
        // Header
        ctx.fillStyle='rgba(200,70,70,0.08)';ctx.fillRect(mx+1,my+1,mw-2,30);
        drawIC('swords',mx+10,my+6,18);
        ctx.fillStyle='#F66';ctx.font='bold 14px monospace';ctx.fillText('RECRUTAR TROPAS',mx+34,my+22);

        let hb=hasBarracks();
        for(let i=0;i<UNIT_LIST.length;i++){
            let type=UNIT_LIST[i],def=UDEF[type];
            let by=my+35+i*48,ok=canAfford(def.cost)&&hb&&getAvailablePop()>=(def.cost.pop||0);
            ctx.fillStyle='rgba(35,35,60,0.8)';ctx.fillRect(mx+5,by,mw-10,42);
            ctx.strokeStyle=ok?'rgba(100,100,140,0.5)':'rgba(100,50,50,0.5)';ctx.lineWidth=1;ctx.strokeRect(mx+5,by,mw-10,42);
            drawIC(def.icon,mx+10,by+4,16);
            ctx.fillStyle=ok?'#EEE':'#666';ctx.font='13px monospace';
            ctx.fillText('['+(i+1)+'] '+def.name,mx+30,by+18);
            ctx.fillStyle=ok?'#999':'#555';ctx.font='10px monospace';
            ctx.fillText('G:'+def.cost.gold+' F:'+def.cost.food+' Pop:'+(def.cost.pop||0)+' | HP:'+def.hp+' ATK:'+def.atk+' DEF:'+def.def,mx+30,by+34);
            uiButtons.push({x:mx+5,y:by,w:mw-10,h:42,fn:()=>{recruitUnit(type)}});
        }
        if(!hb){ctx.fillStyle='#F44';ctx.font='12px monospace';drawIC('warn',mx+10,my+mh-16,14);ctx.fillText('Construa um Quartel primeiro!',mx+28,my+mh-6)}
    }

    // ─── Menu Construção Selecionada ───
    if(gs.showBuildingMenu&&gs.selectedBuilding&&!gs.showRecruitMenu){
        let sb=gs.selectedBuilding;
        let mw=250,mh=sb.type==='CASTLE'?80:160,mx=W/2-mw/2,my=btmY-mh-15;
        ctx.fillStyle='rgba(12,12,30,0.96)';ctx.fillRect(mx,my,mw,mh);
        ctx.strokeStyle='rgba(255,215,0,0.5)';ctx.lineWidth=2;ctx.strokeRect(mx,my,mw,mh);
        drawIC(sb.def.icon,mx+10,my+6,18);
        ctx.fillStyle='#FFD700';ctx.font='bold 14px monospace';ctx.fillText(sb.def.name,mx+34,my+22);
        ctx.fillStyle='#AAA';ctx.font='12px monospace';
        ctx.fillText('HP: '+sb.hp+'/'+sb.maxHp,mx+10,my+40);
        if(sb.def.produces){let pr='';for(let r in sb.def.produces)pr+=r+':+'+sb.def.produces[r]+' ';ctx.fillText('Produz: '+pr,mx+10,my+56)}
        if(sb.type!=='CASTLE'){
            // Mover button
            let btnY1=my+mh-70;
            ctx.fillStyle='rgba(0,100,200,0.5)';ctx.fillRect(mx+10,btnY1,mw-20,28);
            ctx.strokeStyle='rgba(0,180,255,0.4)';ctx.lineWidth=1;ctx.strokeRect(mx+10,btnY1,mw-20,28);
            drawIC('move',mx+16,btnY1+5,16);
            ctx.fillStyle='#FFF';ctx.font='13px monospace';ctx.fillText('[M] Mover',mx+38,btnY1+18);
            uiButtons.push({x:mx+10,y:btnY1,w:mw-20,h:28,fn:()=>{startMoveBuilding(sb)}});
            // Vender button
            let btnY2=my+mh-36;
            let refG=Math.floor((sb.def.cost.gold||0)*0.5),refW=Math.floor((sb.def.cost.wood||0)*0.5);
            ctx.fillStyle='rgba(180,50,50,0.5)';ctx.fillRect(mx+10,btnY2,mw-20,28);
            ctx.strokeStyle='rgba(255,100,100,0.4)';ctx.lineWidth=1;ctx.strokeRect(mx+10,btnY2,mw-20,28);
            drawIC('gold',mx+16,btnY2+5,16);
            ctx.fillStyle='#FFF';ctx.font='13px monospace';ctx.fillText('[V] Vender ('+refG+'g '+refW+'w)',mx+38,btnY2+18);
            uiButtons.push({x:mx+10,y:btnY2,w:mw-20,h:28,fn:()=>{sellBuilding(sb)}});
        }
    }

    // ─── Mensagens ───
    for(let i=0;i<gs.messages.length;i++){
        let m=gs.messages[i],a=Math.min(1,m.timer);
        ctx.globalAlpha=a;
        let my2=56+i*26;
        ctx.font='12px monospace';let tw=ctx.measureText(m.text).width;
        // Determinar tipo de mensagem e cor de borda
        let msgBorder='rgba(100,100,140,0.4)';let msgIcon=null;
        if(m.text.startsWith('[x]')){msgBorder='rgba(220,60,60,0.5)';msgIcon='error'}
        else if(m.text.startsWith('[+]')){msgBorder='rgba(60,180,60,0.5)';msgIcon='check'}
        else if(m.text.startsWith('[!]')||m.text.startsWith('[!!]')){msgBorder='rgba(220,160,40,0.6)';msgIcon='warn'}
        else if(m.text.startsWith('[~]')){msgBorder='rgba(80,140,220,0.5)';msgIcon='dove'}
        else if(m.text.startsWith('[i]')){msgBorder='rgba(100,160,220,0.4)';msgIcon='gear'}
        // Strip prefix
        let txt=m.text.replace(/^\[!*\]\s*/,'').replace(/^\[x\]\s*/,'').replace(/^\[~\]\s*/,'').replace(/^\[\+\]\s*/,'').replace(/^\[i\]\s*/,'');
        let totalW=tw+24+(msgIcon?20:0);
        let msgX=W/2-(totalW)/2;
        ctx.fillStyle='rgba(8,8,20,0.82)';ctx.fillRect(msgX,my2-14,totalW,22);
        ctx.strokeStyle=msgBorder;ctx.lineWidth=1;ctx.strokeRect(msgX,my2-14,totalW,22);
        if(msgIcon) drawIC(msgIcon,msgX+4,my2-11,16);
        ctx.fillStyle='#e0e0e8';ctx.textAlign='center';ctx.fillText(txt,W/2+(msgIcon?8:0),my2);
        ctx.textAlign='left';ctx.globalAlpha=1;
    }

    // ─── Minimapa ───
    let mmS=140,mmX=W-mmS-12,mmY=50;
    ctx.fillStyle='rgba(0,0,0,0.85)';ctx.fillRect(mmX-3,mmY-3,mmS+6,mmS+6);
    ctx.strokeStyle='#FFD700';ctx.lineWidth=1;ctx.strokeRect(mmX-3,mmY-3,mmS+6,mmS+6);

    let mtw=mmS/MAP_W,mth=mmS/MAP_H;
    // Terreno + territorios
    for(let y=0;y<MAP_H;y+=3){for(let x=0;x<MAP_W;x+=3){
        ctx.fillStyle=TERRAIN_COLORS[gs.map[y][x]][0];
        ctx.fillRect(mmX+x*mtw,mmY+y*mth,mtw*3+1,mth*3+1);
    }}
    for(let ty=0;ty<TERR_H;ty++)for(let tx=0;tx<TERR_W;tx++){
        let tt=gs.territories[terrIndex(tx,ty)];
        ctx.fillStyle=OWNER_COLOR[tt.owner]||OWNER_COLOR[OWNER.NEUTRAL];
        ctx.fillRect(mmX+tx*TERR_TILE*mtw,mmY+ty*TERR_TILE*mth,TERR_TILE*mtw,TERR_TILE*mth);
    }
    // Construções
    for(let b of gs.buildings){
        if(b.hp<=0)continue;
        ctx.fillStyle=b.type==='CASTLE'?'#FFD700':'#CCC';
        ctx.fillRect(mmX+b.x*mtw,mmY+b.y*mth,Math.max(2,b.def.w*mtw),Math.max(2,b.def.h*mth));
    }
    // Unidades
    for(let u of gs.units){if(!u.alive)continue;ctx.fillStyle='#0F0';ctx.fillRect(mmX+(u.x/TILE)*mtw,mmY+(u.y/TILE)*mth,2,2)}
    for(let e of gs.enemies){if(!e.alive)continue;ctx.fillStyle='#F00';ctx.fillRect(mmX+(e.x/TILE)*mtw,mmY+(e.y/TILE)*mth,2,2)}
    // Animais no minimapa
    for(let a of gs.animals){if(!a.alive)continue;ctx.fillStyle='#CC8844';ctx.fillRect(mmX+(a.x/TILE)*mtw,mmY+(a.y/TILE)*mth,2,2)}
    for(let a of gs.armies){
        ctx.fillStyle=a.owner===OWNER.PLAYER?'#4FC3F7':a.owner===OWNER.ENEMY_A?'#F06262':a.owner===OWNER.VAMPIRES?'#CC0000':'#BA68C8';
        ctx.fillRect(mmX+(a.x/TILE)*mtw-1,mmY+(a.y/TILE)*mth-1,3,3);
    }
    // Rei
    if(gs.king){ctx.fillStyle='#FFD700';ctx.fillRect(mmX+(gs.king.x/TILE)*mtw-2,mmY+(gs.king.y/TILE)*mth-2,4,4)}
    // Viewport
    ctx.strokeStyle='#FFF';ctx.lineWidth=1;
    let sc=mmS/(MAP_W*TILE);
    ctx.strokeRect(mmX+gs.camera.x*sc,mmY+gs.camera.y*sc,(W/gs.zoom)*sc,(H/gs.zoom)*sc);

    if(gs.showGuide){
        let matches=getGuideMatches(gs.guideQuery);
        let bw=Math.min(760,W-80),bh=Math.min(540,H-120),bx=(W-bw)/2,by=(H-bh)/2;
        ctx.fillStyle='rgba(8,8,18,0.94)';ctx.fillRect(bx,by,bw,bh);
        ctx.strokeStyle='#d8b46a';ctx.lineWidth=3;ctx.strokeRect(bx,by,bw,bh);
        ctx.fillStyle='#f3d48a';ctx.font='bold 24px monospace';ctx.textAlign='left';
        ctx.fillText('Livro do Reino',bx+24,by+36);
        ctx.font='12px monospace';ctx.fillStyle='#aaa';
        ctx.fillText('Digite para pesquisar. Backspace apaga. O ou ESC fecha.',bx+24,by+58);
        ctx.fillStyle='rgba(255,255,255,0.08)';ctx.fillRect(bx+24,by+74,bw-48,34);
        ctx.strokeStyle='#666';ctx.lineWidth=1;ctx.strokeRect(bx+24,by+74,bw-48,34);
        ctx.fillStyle='#fff';ctx.font='14px monospace';
        ctx.fillText('Busca: '+(gs.guideQuery||'...'),bx+36,by+96);

        let entry=matches[0]||null;
        ctx.fillStyle='#d9c08a';ctx.font='bold 16px monospace';
        ctx.fillText('Resultados: '+matches.length,bx+24,by+136);
        for(let i=0;i<Math.min(6,matches.length);i++){
            ctx.fillStyle=i===0?'#fff2b8':'#cfcfcf';
            ctx.font=i===0?'bold 15px monospace':'14px monospace';
            ctx.fillText((i===0?'▶ ':'• ')+matches[i].title,bx+30,by+168+i*24);
        }
        if(entry){
            ctx.fillStyle='rgba(255,255,255,0.05)';ctx.fillRect(bx+24,by+238,bw-48,bh-262);
            ctx.strokeStyle='#444';ctx.strokeRect(bx+24,by+238,bw-48,bh-262);
            ctx.fillStyle='#f3d48a';ctx.font='bold 18px monospace';
            ctx.fillText(entry.title,bx+40,by+268);
            ctx.fillStyle='#ddd';ctx.font='14px monospace';
            let words=entry.body.split(' '),line='',yy=by+300,maxW=bw-90;
            for(let word of words){
                let test=line?line+' '+word:word;
                if(ctx.measureText(test).width>maxW){ctx.fillText(line,bx+40,yy);line=word;yy+=24;}
                else line=test;
            }
            if(line) ctx.fillText(line,bx+40,yy);
        }else{
            ctx.fillStyle='#f88';ctx.font='14px monospace';
            ctx.fillText('Nenhum topico encontrado para essa busca.',bx+30,by+170);
        }
        ctx.textAlign='left';
    }

    // ─── Painel de Diplomacia ───
    if(gs.showDiplomacy){
        let dw=Math.min(620,W-80),dh=Math.min(480,H-120),dx2=(W-dw)/2,dy2=(H-dh)/2;
        ctx.fillStyle='rgba(8,8,18,0.94)';ctx.fillRect(dx2,dy2,dw,dh);
        ctx.strokeStyle='#CC4444';ctx.lineWidth=3;ctx.strokeRect(dx2,dy2,dw,dh);
        ctx.fillStyle='#FFD700';ctx.font='bold 22px monospace';ctx.textAlign='left';
        drawIC('diplomacy',dx2+18,dy2+14,22);ctx.fillText('Diplomacia dos Reinos',dx2+46,dy2+32);
        ctx.font='11px monospace';ctx.fillStyle='#aaa';
        ctx.fillText('[N] ou [ESC] para fechar',dx2+20,dy2+50);

        let kingdoms=[
            {owner:OWNER.ENEMY_A,name:'Reino dos Bárbaros',icon:'axe',color:'#F06262'},
            {owner:OWNER.ENEMY_B,name:'Reino dos Magos',icon:'crystal',color:'#BA68C8'},
            {owner:OWNER.VAMPIRES,name:'Reino dos Vampiros',icon:'vampire',color:'#CC0000'}
        ];
        let ky=dy2+75;
        for(let ki=0;ki<kingdoms.length;ki++){
            let kd=kingdoms[ki];
            let state=getDiplo(OWNER.PLAYER,kd.owner);
            let terrs=getOwnerTerritories(kd.owner).length;
            let stateStr=state===DIPLO.WAR?'GUERRA':state===DIPLO.ALLIANCE?'ALIANCA':state===DIPLO.PEACE?'PAZ':'NEUTRO';
            let stateIC=state===DIPLO.WAR?'swords':state===DIPLO.ALLIANCE?'handshake':state===DIPLO.PEACE?'dove':'neutral';
            let stateColor=state===DIPLO.WAR?'#F44':state===DIPLO.ALLIANCE?'#4F4':state===DIPLO.PEACE?'#8CF':'#AAA';
            let rh=88;

            // Background do reino
            ctx.fillStyle='rgba(30,30,50,0.8)';ctx.fillRect(dx2+15,ky,dw-30,rh);
            ctx.strokeStyle=kd.color;ctx.lineWidth=2;ctx.strokeRect(dx2+15,ky,dw-30,rh);

            // Info do reino
            ctx.fillStyle=kd.color;ctx.font='bold 16px monospace';
            drawIC(kd.icon,dx2+26,ky+6,18);ctx.fillText(kd.name,dx2+50,ky+22);
            ctx.fillStyle='#AAA';ctx.font='12px monospace';
            ctx.fillText('Territórios: '+terrs+'  |  Estado: ',dx2+28,ky+42);
            let tw=ctx.measureText('Territórios: '+terrs+'  |  Estado: ').width;
            drawIC(stateIC,dx2+28+tw,ky+30,14);ctx.fillStyle=stateColor;ctx.fillText(stateStr,dx2+28+tw+18,ky+42);

            // Botões de ação
            let btnW=110,btnH=26,btnY=ky+52;
            // Botão 1: Declarar Guerra (se não em guerra)
            if(state!==DIPLO.WAR){
                let bx1=dx2+28;
                ctx.fillStyle='rgba(200,50,50,0.7)';ctx.fillRect(bx1,btnY,btnW,btnH);
                ctx.strokeStyle='#F44';ctx.lineWidth=1;ctx.strokeRect(bx1,btnY,btnW,btnH);
                ctx.fillStyle='#FFF';ctx.font='11px monospace';drawIC('swords',bx1+6,btnY+3,16);ctx.fillText('Guerra',bx1+28,btnY+17);
                uiButtons.push({x:bx1,y:btnY,w:btnW,h:btnH,fn:()=>{declareWar(OWNER.PLAYER,kd.owner)}});
            }
            // Botão 2: Fazer Aliança (se em guerra ou neutro)
            if(state===DIPLO.WAR||state===DIPLO.NEUTRAL){
                let bx2=dx2+28+(state!==DIPLO.WAR?0:1)*(btnW+10);
                if(state!==DIPLO.WAR) bx2=dx2+28+btnW+10;
                ctx.fillStyle='rgba(50,150,50,0.7)';ctx.fillRect(bx2,btnY,btnW,btnH);
                ctx.strokeStyle='#4F4';ctx.lineWidth=1;ctx.strokeRect(bx2,btnY,btnW,btnH);
                ctx.fillStyle='#FFF';ctx.font='11px monospace';drawIC('handshake',bx2+6,btnY+3,16);ctx.fillText('Alianca',bx2+28,btnY+17);
                uiButtons.push({x:bx2,y:btnY,w:btnW,h:btnH,fn:()=>{makeAlliance(OWNER.PLAYER,kd.owner)}});
            }
            // Botão 3: Fazer Paz (se em guerra)
            if(state===DIPLO.WAR){
                let bx3=dx2+28+btnW+10;
                ctx.fillStyle='rgba(80,130,200,0.7)';ctx.fillRect(bx3,btnY,btnW,btnH);
                ctx.strokeStyle='#8CF';ctx.lineWidth=1;ctx.strokeRect(bx3,btnY,btnW,btnH);
                ctx.fillStyle='#FFF';ctx.font='11px monospace';drawIC('dove',bx3+6,btnY+3,16);ctx.fillText('Paz',bx3+28,btnY+17);
                uiButtons.push({x:bx3,y:btnY,w:btnW,h:btnH,fn:()=>{makePeace(OWNER.PLAYER,kd.owner)}});
            }

            ky+=rh+10;
        }

        // Relações entre reinos IA
        ctx.fillStyle='#d8b46a';ctx.font='bold 14px monospace';
        ctx.fillText('Relações entre reinos IA:',dx2+20,ky+18);
        ky+=30;
        let aiPairs=[
            [OWNER.ENEMY_A,OWNER.ENEMY_B,'Bárbaros','Magos'],
            [OWNER.ENEMY_A,OWNER.VAMPIRES,'Bárbaros','Vampiros'],
            [OWNER.ENEMY_B,OWNER.VAMPIRES,'Magos','Vampiros']
        ];
        for(let pair of aiPairs){
            let st=getDiplo(pair[0],pair[1]);
            let stStr=st===DIPLO.WAR?'GUERRA':st===DIPLO.ALLIANCE?'ALIANCA':st===DIPLO.PEACE?'PAZ':'NEUTRO';
            let stIC=st===DIPLO.WAR?'swords':st===DIPLO.ALLIANCE?'handshake':st===DIPLO.PEACE?'dove':'neutral';
            let stCol=st===DIPLO.WAR?'#F44':st===DIPLO.ALLIANCE?'#4F4':st===DIPLO.PEACE?'#8CF':'#AAA';
            ctx.fillStyle='#CCC';ctx.font='12px monospace';
            ctx.fillText(pair[2]+' ↔ '+pair[3]+': ',dx2+28,ky);
            let tw2=ctx.measureText(pair[2]+' ↔ '+pair[3]+': ').width;
            drawIC(stIC,dx2+28+tw2,ky-12,14);ctx.fillStyle=stCol;ctx.fillText(stStr,dx2+28+tw2+18,ky);
            ky+=22;
        }
        ctx.textAlign='left';
    }

    // ─── Pause ───
    if(gs.paused){
        ctx.fillStyle='rgba(0,0,0,0.6)';ctx.fillRect(0,0,W,H);
        ctx.fillStyle='#FFD700';ctx.font='bold 48px monospace';ctx.textAlign='center';
        drawIC('pause',W/2-160,H/2-36,40);ctx.fillText('PAUSADO',W/2,H/2);
        ctx.font='18px monospace';ctx.fillStyle='#AAA';
        ctx.fillText('Pressione [P] para continuar',W/2,H/2+40);
        ctx.textAlign='left';
    }

    // ─── Game Over ───
    if(gs.phase==='gameover'){
        ctx.fillStyle='rgba(0,0,0,0.75)';ctx.fillRect(0,0,W,H);
        ctx.fillStyle='#FF0000';ctx.font='bold 52px monospace';ctx.textAlign='center';
        drawIC('skull',W/2-180,H/2-65,44);ctx.fillText('DERROTA!',W/2,H/2-30);
        ctx.font='20px monospace';ctx.fillStyle='#CCC';
        ctx.fillText('Seu castelo foi destruído!',W/2,H/2+10);
        ctx.fillText('Ondas sobrevividas: '+gs.waveNumber,W/2,H/2+40);
        ctx.fillStyle='#FFD700';
        ctx.fillText('Pressione [F5] para recomeçar',W/2,H/2+80);
        ctx.textAlign='left';
    }
}

function renderMenu(){
    ctx.fillStyle='#0a0a1a';ctx.fillRect(0,0,W,H);

    // Estrelas animadas
    for(let i=0;i<80;i++){
        let sx=(hash(i,0)%W),sy=(hash(0,i)%H);
        let br=0.3+Math.sin(gs.gameTime*2+i)*0.7;
        ctx.fillStyle=`rgba(255,255,200,${Math.max(0,br)*0.5})`;
        ctx.fillRect(sx,sy,2,2);
    }

    // Castelo grande no fundo
    ctx.globalAlpha=0.15;
    let scaleX=6,scaleY=6;
    let csx=W/2-SC.castle.width*scaleX/2,csy=H/2-SC.castle.height*scaleY/2+40;
    ctx.drawImage(SC.castle,csx,csy,SC.castle.width*scaleX,SC.castle.height*scaleY);
    ctx.globalAlpha=1;

    // Título
    let glow=0.7+Math.sin(gs.gameTime*2)*0.3;
    ctx.fillStyle=`rgba(255,215,0,${glow})`;ctx.font='bold 56px monospace';ctx.textAlign='center';
    drawIC('swords',W/2-280,H/2-136,40);ctx.fillText('REINO MEDIEVAL',W/2,H/2-100);drawIC('swords',W/2+140,H/2-136,40);

    ctx.fillStyle='#CCC';ctx.font='20px monospace';
    ctx.fillText('Pixel Art Strategy Game',W/2,H/2-60);

    ctx.fillStyle='#FFF';ctx.font='16px monospace';
    let blink=Math.sin(gs.gameTime*3)>0;
    if(blink) ctx.fillText('▶ Pressione qualquer tecla para começar ◀',W/2,H/2+10);

    // Instruções
    ctx.fillStyle='#888';ctx.font='13px monospace';
    let info=[
        'WASD - Mover o Rei',
        '[B] - Menu de Construcao',
        '[R] - Menu de Recrutamento',
        'Pedreira minera pedra perto das rochas',
        '[U] melhora espadas | [J] reforca muralhas',
        '[G] - Converter tropas em exercito',
        'Scroll - Zoom / Botao do meio arrasta camera',
        '[O] - Livro de ajuda com pesquisa',
        'Arrastar construcao para mover',
        'Click direito - Mover/Atacar tropas',
        'Construa casas para aumentar populacao',
        'Produza comida para evitar a fome',
        '[F5] Salvar  |  [F9] Carregar',
        '[P] - Pausar'
    ];
    let infoIcons=['gamepad','build','swords','quarry','hammer','flag','zoom','book','mouse','mouse','pop','food','save','pause'];
    for(let i=0;i<info.length;i++){
        drawIC(infoIcons[i],W/2-240,H/2+48+i*22,14);
        ctx.fillText(info[i],W/2-218,H/2+60+i*22);
    }

    ctx.fillStyle='#555';ctx.font='11px monospace';
    ctx.fillText('Construa seu reino • Recrute um exército • Defenda contra invasores',W/2,H-40);
    ctx.textAlign='left';
}

// ═══════════════════════════════════════════════════════════
// CÂMERA
// ═══════════════════════════════════════════════════════════
function updateCamera(){
    if(!gs.king)return;
    let view=getViewSize();
    let tx=gs.king.x-view.w/2+gs.cameraOffset.x,ty=gs.king.y-view.h/2+gs.cameraOffset.y;
    gs.camera.x=lerp(gs.camera.x,tx,0.08);
    gs.camera.y=lerp(gs.camera.y,ty,0.08);
    clampCamera();
}

// ═══════════════════════════════════════════════════════════
// GAME LOOP
// ═══════════════════════════════════════════════════════════
let lastTime=0;

function gameLoop(timestamp){
    let dt=Math.min((timestamp-lastTime)/1000,0.05);
    lastTime=timestamp;

    if(gs.phase==='menu'){
        gs.gameTime+=dt;
        renderMenu();
        requestAnimationFrame(gameLoop);return;
    }

    if(!gs.paused&&gs.phase==='playing'){
        gs.gameTime+=dt;

        // Atualizar rei
        if(gs.king) gs.king.update(dt);
        updateCamera();

        // Atualizar construções
        for(let b of gs.buildings) b.update(dt);

        // Atualizar unidades do jogador
        for(let i=gs.units.length-1;i>=0;i--){
            gs.units[i].update(dt);
            if(!gs.units[i].alive){
                gs.units[i].selected=false;
                gs.selectedUnits=gs.selectedUnits.filter(u=>u!==gs.units[i]);
                gs.units.splice(i,1);
            }
        }

        // Atualizar inimigos
        for(let i=gs.enemies.length-1;i>=0;i--){
            gs.enemies[i].update(dt);
            if(!gs.enemies[i].alive){
                let e=gs.enemies[i];
                gs.resources.gold+=e.loot.gold;
                gs.resources.food+=e.loot.food;
                addParticle(e.x,e.y-5,'+'+e.loot.gold+'g','#FFD700');
                gs.enemies.splice(i,1);
            }
        }

        // Recursos
        updateResources(dt);
        updatePopulation(dt);
        updateHunger(dt);
        updateTerritoryEconomy(dt);
        updateKingdomAI(dt);
        updateArmies(dt);
        updateDayNight(dt);
        updateRandomEvents(dt);
        updateAnimals(dt);

        // Efeitos
        updateEffects(dt);

        // Ondas de inimigos
        gs.waveTimer+=dt;
        if(gs.waveTimer>=65){gs.waveTimer=0;spawnWave()}

        // Spawn aleatório de bandidos
        if(Math.random()<0.0003*dt*60&&gs.waveNumber>=1){
            let fx,fy;
            do{
                fx=randInt(5,MAP_W-5);fy=randInt(5,MAP_H-5);
            }while(gs.map[fy][fx]===T.WATER||gs.map[fy][fx]===T.MOUNTAIN||
                   dist(fx*TILE,fy*TILE,gs.king.x,gs.king.y)<TILE*20);
            gs.enemies.push(new EnemyUnit(fx*TILE,fy*TILE,'bandit'));
        }

        // Game over
        let castle=gs.buildings.find(b=>b.type==='CASTLE');
        if(!castle||castle.hp<=0) gs.phase='gameover';

        // Limpar construções destruídas
        gs.buildings=gs.buildings.filter(b=>b.hp>0);

        // Rei morreu - respawn no castelo
        if(gs.king&&!gs.king.alive){
            let c=gs.buildings.find(b=>b.type==='CASTLE');
            if(c){
                gs.king.hp=gs.king.maxHp;gs.king.alive=true;
                gs.king.x=(c.x+1.5)*TILE;gs.king.y=(c.y+3.5)*TILE;
                addMessage('[+] O Rei retornou ao castelo!');
            }
        }
    }

    // ─── RENDER ───
    ctx.save();
    ctx.fillStyle='#0a0a1a';ctx.fillRect(-5,-5,W+10,H+10);
    // Screen shake
    if(gs.screenShake>0){
        let sh=gs.screenShake*4;
        ctx.translate(rand(-sh,sh),rand(-sh,sh));
    }
    ctx.scale(gs.zoom,gs.zoom);
    renderTerrain();
    renderBuildings();
    renderBuildPreview();
    renderEntities();
    renderEffects();

    // Night overlay
    let nightA=getNightAlpha();
    if(nightA>0){
        ctx.fillStyle='rgba(10,5,40,'+nightA.toFixed(3)+')';
        ctx.fillRect(-10/gs.zoom,-10/gs.zoom,(W+20)/gs.zoom,(H+20)/gs.zoom);
    }

    // Fog in vampire territories
    let view=getViewSize();
    let fCols=Math.ceil(view.w/TILE)+2,fRows=Math.ceil(view.h/TILE)+2;
    let fstx=Math.floor(gs.camera.x/TILE),fsty=Math.floor(gs.camera.y/TILE);
    let fox=-(gs.camera.x%TILE),foy=-(gs.camera.y%TILE);
    for(let row=-1;row<fRows;row+=2){
        for(let col=-1;col<fCols;col+=2){
            let tx=fstx+col,ty=fsty+row;
            if(tx<0||tx>=MAP_W||ty<0||ty>=MAP_H)continue;
            let terr=getTerritoryByTile(tx,ty);
            if(terr&&terr.owner===OWNER.VAMPIRES){
                let dx=col*TILE+fox,dy=row*TILE+foy;
                let fogA=0.08+Math.sin(gs.gameTime*0.8+tx*0.3+ty*0.5)*0.04;
                ctx.fillStyle='rgba(60,0,60,'+fogA.toFixed(3)+')';
                ctx.fillRect(dx,dy,TILE*2,TILE*2);
            }
        }
    }

    ctx.restore();
    renderUI();

    requestAnimationFrame(gameLoop);
}

// ═══════════════════════════════════════════════════════════
// INICIALIZAÇÃO
// ═══════════════════════════════════════════════════════════
function init(){
    initIcons();
    initSprites();
    gs.map=generateMap();
    initResourceNodes();
    initTerritories();
    initKingdoms();
    initDiplomacy();
    initRuins();
    initVampireStructures();
    initAnimals();

    let cx=Math.floor(MAP_W/2)-1,cy=Math.floor(MAP_H/2)-1;

    // Castelo inicial
    gs.buildings.push(new Building(cx,cy,'CASTLE'));

    // Construções iniciais
    gs.buildings.push(new Building(cx-2,cy,'HOUSE'));
    gs.buildings.push(new Building(cx+3,cy,'HOUSE'));
    gs.buildings.push(new Building(cx-2,cy+3,'FARM'));
    gs.buildings.push(new Building(cx+3,cy+2,'LUMBER'));

    // Rei
    gs.king=new King((cx+1.5)*TILE,(cy+3.5)*TILE);

    // Câmera inicial
    gs.camera.x=gs.king.x-W/(2*gs.zoom);
    gs.camera.y=gs.king.y-H/(2*gs.zoom);
    clampCamera();
    updateMouseWorld();

    requestAnimationFrame(gameLoop);
}

init();
</script>
